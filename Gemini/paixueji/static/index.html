<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paixueji - Learn by Answering</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Paixueji Assistant</h1>
            <p>Answer questions about objects!</p>
        </div>

        <div class="start-form" id="startForm">
            <label for="age">Child's Age:</label>
            <select id="age">
                <option value="3">3 years</option>
                <option value="4">4 years</option>
                <option value="5">5 years</option>
                <option value="6" selected>6 years</option>
                <option value="7">7 years</option>
                <option value="8">8 years</option>
            </select>

            <label for="assistantTone">Assistant Tone:</label>
            <select id="assistantTone">
                <option value="friendly" selected>Friendly (Default)</option>
                <option value="excited">Excited & Energetic</option>
                <option value="teacher">Teacher</option>
                <option value="pirate">Pirate</option>
                <option value="robot">Robot</option>
                <option value="storyteller">Storyteller</option>
            </select>

            <label for="nextQuestionFocus">Focus Mode:</label>
            <select id="nextQuestionFocus" onchange="saveFocusPreference()">
                <option value="system_managed" selected>System Managed (Auto)</option>
                <option value="depth">Depth (Deep Dive)</option>
                <option value="width_shape">Width - Same Shape</option>
                <option value="width_color">Width - Same Color</option>
                <option value="width_category">Width - Same Category</option>
            </select>

            <label for="objectName">What object are we learning about?</label>
            <div class="object-input-row">
                <input type="text" id="objectName" placeholder="e.g., apple, dog, tree" />
                <button type="button" onclick="classifyObject()" id="classifyBtn" class="classify-btn">Classify</button>
            </div>
            <div id="classifyStatus" class="classify-status"></div>

            <label for="level1Category">Level 1 Category:</label>
            <select id="level1Category" onchange="onLevel1Change()">
                <option value="">Select...</option>
                <option value="none">None of the Above</option>
            </select>

            <label for="level2Category">Level 2 Category:</label>
            <select id="level2Category" onchange="onLevel2Change()" disabled>
                <option value="">Select...</option>
            </select>

            <label for="level3Category">Level 3 Category:</label>
            <select id="level3Category" disabled>
                <option value="">Select...</option>
            </select>

            <button onclick="startConversation()">Start Learning!</button>
        </div>

        <div class="progress-indicator" id="progressIndicator" style="display: none;">
            <span id="progressText">Correct answers: 0/4</span>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
            </div>
        </div>

        <div class="messages" id="messages"></div>

        <!-- Manual Topic Switch Override Panel -->
        <div id="manualSwitchPanel" style="display: none; padding: 15px; margin: 10px; background: #fffacd; border: 2px solid #ffd700; border-radius: 8px;">
            <p style="margin: 0 0 10px 0;">
                <strong>💡 Object detected:</strong> <span id="detectedObjectName" style="font-weight: bold; color: #d97706;"></span>
                <br>
                <small id="switchReasoning" style="color: #666;"></small>
            </p>
            <div style="display: flex; gap: 10px;">
                <button id="forceSwitchBtn" onclick="forceSwitch()" style="background: #fbbf24; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold;">
                    Switch to <span id="switchToObjectName"></span>
                </button>
                <button onclick="dismissSwitchPanel()" style="background: #e5e7eb; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer;">
                    Stay on current topic
                </button>
            </div>
        </div>

        <!-- Object Selection Panel (for system-managed mode) -->
        <div id="objectSelectionPanel" style="display: none; padding: 15px; margin: 10px; background: #f0f9ff; border: 2px solid #3b82f6; border-radius: 8px;">
            <p style="margin: 0 0 10px 0; font-weight: bold;">
                Choose what you'd like to learn about next:
            </p>
            <div id="objectChoices" style="display: flex; flex-direction: column; gap: 8px;">
                <!-- Dynamically populated with buttons -->
            </div>
        </div>

        <div class="input-area">
            <div id="thinking-time" class="thinking-time"></div>

            <!-- Active Focus Control (Hidden by default, shown during chat) -->
            <div id="activeFocusControl" class="focus-control" style="display: none; margin-bottom: 10px; justify-content: flex-end;">
                <label for="activeFocusMode">Next Question Focus:</label>
                <select id="activeFocusMode">
                    <option value="system_managed">System Managed (Auto)</option>
                    <option value="depth">Depth (Deep Dive)</option>
                    <option value="width_shape">Width - Same Shape</option>
                    <option value="width_color">Width - Same Color</option>
                    <option value="width_category">Width - Same Category</option>
                </select>
            </div>

            <div class="input-row">
                <input
                    type="text"
                    id="userInput"
                    placeholder="Type your answer here..."
                    onkeypress="if(event.key==='Enter' && !event.shiftKey) sendMessage()"
                >
                <button id="stopBtn" onclick="stopStreaming()" style="display: none;">Stop</button>
                <button id="sendBtn" onclick="sendMessage()" disabled>Send</button>
            </div>
        </div>
    </div>

    <!-- Debug Panel (positioned to the right of main container) -->
    <div id="debugPanel" style="display: none; position: fixed; top: 20px; right: 20px; width: 400px; max-height: 90vh; overflow-y: auto; padding: 20px; background: white; border: 2px solid #3b82f6; border-radius: 12px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); z-index: 1000;">
        <h3 style="margin-top: 0; color: #3b82f6; border-bottom: 2px solid #3b82f6; padding-bottom: 10px;">🐛 Debug Panel</h3>

        <!-- Session Information -->
        <div style="background: #f0f9ff; padding: 12px; border-radius: 6px; margin-bottom: 15px; font-size: 0.9em;">
            <div style="margin-bottom: 8px;">
                <strong>Session ID:</strong>
                <div style="font-family: monospace; font-size: 0.85em; color: #64748b; word-break: break-all;" id="debugSessionId">-</div>
            </div>
            <div style="margin-bottom: 8px;">
                <strong>Current Object:</strong>
                <div style="color: #0f172a;" id="debugCurrentObject">-</div>
            </div>
            <div style="margin-bottom: 8px;">
                <strong>Tone:</strong>
                <div style="color: #0f172a;" id="debugTone">-</div>
            </div>
            <div style="margin-bottom: 8px;">
                <strong>Focus Mode:</strong>
                <div style="color: #0f172a;" id="debugFocusMode">-</div>
            </div>
            <div style="margin-bottom: 8px;">
                <strong>System Managed:</strong>
                <div style="color: #0f172a;" id="debugSystemManaged">-</div>
            </div>
            <div>
                <strong>Correct Answers:</strong>
                <div style="color: #10b981; font-weight: bold;" id="debugCorrectCount">0/4</div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div style="margin-bottom: 15px;">
            <button onclick="showFlowTreeModal()" style="width: 100%; padding: 10px; margin-bottom: 8px; background: #3b82f6; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">
                Show Flow Tree (Popup)
            </button>
            <button onclick="downloadDebugLogs()" style="width: 100%; padding: 10px; background: #10b981; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">
                📥 Download Debug Logs
            </button>
        </div>
    </div>

    <!-- Modal for Flow Tree -->
    <div id="flowTreeModal" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.5); z-index: 3000; justify-content: center; align-items: center;">
        <div style="background: white; width: 95vw; height: 95vh; border-radius: 12px; padding: 20px; display: flex; flex-direction: column; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #e5e7eb; padding-bottom: 10px;">
                <h3 style="margin: 0; font-size: 1.25rem; color: #1f2937;">Conversation Flow Tree</h3>
                <button onclick="closeFlowTreeModal()" style="padding: 8px 16px; background: #ef4444; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.9rem;">Close</button>
            </div>
            <div style="flex: 1; overflow: auto; background: #f9fafb; border-radius: 8px; padding: 20px; border: 1px solid #e5e7eb;">
                <div class="mermaid" id="modalMermaidDiagram"></div>
            </div>
        </div>
    </div>

    <!-- Mermaid.js for flow tree visualization -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
