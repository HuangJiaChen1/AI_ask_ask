<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paixueji - Learn by Answering</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Paixueji Assistant</h1>
            <p>Answer questions about objects!</p>
        </div>

        <div class="start-form" id="startForm">
            <label for="age">Child's Age:</label>
            <select id="age">
                <option value="3">3 years</option>
                <option value="4">4 years</option>
                <option value="5">5 years</option>
                <option value="6" selected>6 years</option>
                <option value="7">7 years</option>
                <option value="8">8 years</option>
            </select>

            <label for="assistantTone">Assistant Tone:</label>
            <select id="assistantTone">
                <option value="friendly" selected>Friendly (Default)</option>
                <option value="excited">Excited & Energetic</option>
                <option value="teacher">Teacher</option>
                <option value="pirate">Pirate</option>
                <option value="robot">Robot</option>
                <option value="storyteller">Storyteller</option>
            </select>

            <label for="objectName">What object are we learning about?</label>
            <div class="object-input-row">
                <input type="text" id="objectName" placeholder="e.g., apple, dog, tree" />
                <button type="button" onclick="classifyObject()" id="classifyBtn" class="classify-btn">Classify</button>
            </div>
            <div id="classifyStatus" class="classify-status"></div>

            <label for="level1Category">Level 1 Category:</label>
            <select id="level1Category" onchange="onLevel1Change()">
                <option value="">Select...</option>
                <option value="none">None of the Above</option>
            </select>

            <label for="level2Category">Level 2 Category:</label>
            <select id="level2Category" onchange="onLevel2Change()" disabled>
                <option value="">Select...</option>
            </select>

            <label for="level3Category">Level 3 Category:</label>
            <select id="level3Category" disabled>
                <option value="">Select...</option>
            </select>

            <button onclick="startConversation()">Start Learning!</button>
        </div>

        <div class="progress-indicator" id="progressIndicator" style="display: none;">
            <span id="progressText">Correct answers: 0/4</span>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
            </div>
        </div>

        <div class="messages" id="messages"></div>

        <div class="input-area">
            <div id="thinking-time" class="thinking-time"></div>
            
            <div class="focus-control">
                <label for="nextQuestionFocus">Focus for NEXT question:</label>
                <select id="nextQuestionFocus" onchange="saveFocusPreference()">
                    <option value="depth" selected>Depth (Dive Deeper)</option>
                    <option value="width_shape">Width (Same Shape)</option>
                    <option value="width_color">Width (Same Color)</option>
                    <option value="width_category">Width (Same Category)</option>
                </select>
            </div>

            <div class="input-row">
                <input
                    type="text"
                    id="userInput"
                    placeholder="Type your answer here..."
                    onkeypress="if(event.key==='Enter' && !event.shiftKey) sendMessage()"
                >
                <button id="stopBtn" onclick="stopStreaming()" style="display: none;">Stop</button>
                <button id="sendBtn" onclick="sendMessage()" disabled>Send</button>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
