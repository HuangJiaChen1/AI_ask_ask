- entity_id: plants_dandelion
  entity_name: Dandelion
  entity_name_cn: 蒲公英
  domain: plants
  parent_category: flowers
  subcategory: wildflowers
  primary_theme:
    theme_id: how_world_works
    weight: 0.42
    reasoning: A dandelion helps children explore how the world works by observing plant parts, seed fluff blowing in wind,
      and how a flower changes over time.
  secondary_themes:
  - theme_id: sharing_planet
    weight: 0.29
    reasoning: Children see dandelions as part of shared outdoor spaces, learning how insects use them, and how picking flowers
      affects nature.
    context_trigger: when the child wants to pick many dandelions or asks if bees need the flowers
  - theme_id: how_we_express
    weight: 0.29
    reasoning: Dandelions invite expression through blowing seed heads, making wishes, drawing the yellow flower, and describing
      what they notice outside.
    context_trigger: when the child blows the fluffy seeds, makes a wish, or talks about making dandelion art
  primary_key_concepts:
  - concept_id: change
    relevance: 1.1
    reasoning: Children can watch a dandelion change from yellow flower to white puffball, then to scattered seeds over days
      and weeks.
  - concept_id: form
    relevance: 0.7
    reasoning: 'The dandelion’s form is easy to explore: bright petals, jagged leaves, hollow stem, and the round, fluffy
      seed head.'
  - concept_id: function
    relevance: 0.9
    reasoning: Kids learn function by linking parts to jobs, like roots taking in water and fluffy seeds helping the plant
      spread.
  secondary_key_concepts:
  - concept_id: causation
    relevance: 0.9
    reasoning: Children notice causes and effects, such as wind or blowing making seeds fly, and sunlight and water helping
      the plant grow.
  - concept_id: connection
    relevance: 0.6
    reasoning: A dandelion connects to weather, soil, insects, and people’s actions, helping children see how living things
      affect each other.
  candidate_related_concepts:
  - concept_id: interdependence
    discipline: science
    reasoning: Children can see how dandelions and insects rely on each other, like bees visiting flowers for nectar and helping
      plants reproduce.
  - concept_id: growth
    discipline: science
    reasoning: Dandelions allow children to track growth from tiny leaves to tall stems, noticing what helps the plant get
      bigger.
  - concept_id: cycles
    discipline: science
    reasoning: The plant shows cycles as it flowers, makes seeds, spreads, and grows again, which children can revisit each
      season.
  - concept_id: sustainability
    discipline: social_studies
    reasoning: Children explore sustainability by deciding how to enjoy flowers while protecting nature, like leaving some
      for insects and regrowth.
  tier_guidance:
    tier_0:
      dimensions:
        appearance:
        - attribute: seed_head
          value: round fluffy puffball
          topics:
          - What shape is the top of the dandelion?
          - Does it look like a little cloud?
        - attribute: seeds
          value: white fluffy seeds
          topics:
          - Can you see the tiny white seeds?
          - Do they look like tiny parachutes?
        - attribute: stem
          value: thin smooth stem
          topics:
          - Can you find the thin stem?
          - Is the stem tall or short?
        senses:
        - attribute: texture
          value: soft and fluffy
          topics:
          - How do you think it feels to touch?
          - Is it soft like a cloud or rough like a rock?
        - attribute: weight
          value: light and delicate
          topics:
          - Do you think it feels heavy or light?
          - What else feels this light?
        - attribute: blow_action
          value: seeds fly when you blow
          topics:
          - What happens when you blow on it?
          - Where do the seeds go?
        emotions:
        - How does seeing those tiny fluffy parachutes make you feel?
        - Would you like to blow the seeds and watch them fly?
        - What else around you feels soft and fluffy?
    tier_1:
      dimensions:
        appearance:
        - attribute: seed_detail
          value: Each seed has a tiny fluffy top like a parachute
          topics:
          - Can you see how each seed has its own fluffy top?
          - Why do you think the seeds have fluff attached?
        - attribute: delicate_structure
          value: The whole puffball is very delicate and light
          topics:
          - What happens if you touch it too hard?
          - Why is the puffball so delicate compared to the stem?
        senses:
        - attribute: texture_comparison
          value: Fuzzy, silky, or puffy — soft things feel different
          topics:
          - Is this dandelion fluff fuzzy or silky?
          - Can you find something else nearby that feels soft but different?
        - attribute: seed_feel
          value: Seeds tickle your fingers like feathers
          topics:
          - How do the seeds feel on your hand?
          - What else feels tickly and light like this?
        emotions:
        - What does it feel like to hold something so soft and delicate?
        - Can you find three more fluffy things nearby?
    tier_2:
      dimensions:
        appearance:
        - attribute: fluff_variety
          value: Softness comes in many forms — the dandelion is puffy, moss is fuzzy, a petal is silky. Each has its own
            kind of soft.
          topics:
          - How is dandelion fluff different from the softness of moss or a feather?
          - Why do you think there are so many different kinds of soft?
        senses:
        - attribute: texture_exploration
          value: Touching different soft things tells you about their texture — puffy, fuzzy, woolly, silky are all words
            for softness.
          topics:
          - How many words for 'soft' can you think of?
          - If you close your eyes and touch something, can you guess what kind of soft it is?
        emotions:
        - When you find something really soft outside, how does it make you feel?
        - Why do you think people like touching fluffy things?
        imagination:
        - If your fluffy finds could talk, what would they say when they met each other?
        - What would you name a fluffy friend you found outside?
