- entity_id: animals_dinosaur
  entity_name: Dinosaur
  entity_name_cn: 恐龙
  domain: animals
  parent_category: reptiles
  subcategory: dinosaurs
  primary_theme:
    theme_id: where_place_time
    weight: 0.4
    reasoning: Dinosaurs help children explore where we are in place and time by thinking about long ago, fossils, and how
      Earth looked different in the past.
  secondary_themes:
  - theme_id: how_world_works
    weight: 0.35
    reasoning: Children investigate how dinosaurs moved, ate, and survived, and how scientists use fossils and bones to learn
      about them.
    context_trigger: when the child pretends to dig like a paleontologist or asks how we know what dinosaurs looked like
  - theme_id: how_we_express
    weight: 0.25
    reasoning: Dinosaurs inspire storytelling, dramatic play, roaring sounds, and drawing imagined scenes, helping children
      express ideas about the past.
    context_trigger: when the child roars, acts out dinosaur play, or invents a dinosaur story with characters and settings
  primary_key_concepts:
  - concept_id: connection
    relevance: 1.0
    reasoning: Children connect dinosaurs to fossils, museums, and today’s animals, noticing similarities and differences
      across time.
  - concept_id: causation
    relevance: 0.9
    reasoning: Dinosaurs prompt causation thinking, such as asking what caused extinction, how fossils formed, or why some
      dinosaurs were huge.
  - concept_id: change
    relevance: 0.9
    reasoning: Dinosaurs make change visible by comparing past and present Earth, including changing climates, landscapes,
      and life forms.
  secondary_key_concepts:
  - concept_id: form
    relevance: 0.8
    reasoning: Children explore dinosaur form by comparing body shapes like horns, long necks, sharp teeth, and tails to guess
      what they did.
  - concept_id: perspective
    relevance: 0.6
    reasoning: Kids practice perspective by imagining life as a dinosaur or a scientist, thinking about what they could see,
      eat, and fear.
  candidate_related_concepts:
  - concept_id: habitat
    discipline: science
    reasoning: Children wonder where dinosaurs lived, picturing forests, swamps, or deserts, and what resources those habitats
      provided.
  - concept_id: change_over_time
    discipline: social_studies
    reasoning: Dinosaurs naturally teach change over time by placing them on a timeline and comparing ancient Earth with today’s
      world.
  - concept_id: diversity
    discipline: science
    reasoning: Children explore diversity by sorting many dinosaur types, noticing different sizes, diets, and body features
      across species.
  - concept_id: growth
    discipline: science
    reasoning: Dinosaur babies and adults support growth ideas as children compare imagined life stages and how animals change
      as they mature.
  tier_guidance:
    tier_0:
      dimensions:
        appearance:
        - attribute: teeth
          value: big sharp teeth
          topics:
          - Can you see those big teeth?
          - Do the teeth look sharp or flat?
        - attribute: legs
          value: strong powerful legs
          topics:
          - Look at those powerful legs\!
          - Do you think it can run fast?
        - attribute: tail
          value: long swinging tail
          topics:
          - Can you find the long tail?
          - Does the tail look heavy?
        - attribute: skin
          value: bumpy scaly skin
          topics:
          - Does the skin look smooth or bumpy?
          - What do you think it feels like?
        senses:
        - attribute: texture
          value: rough and bumpy
          topics:
          - How do you think scaly skin feels?
          - Is it smooth like your skin or bumpy?
        - attribute: sound
          value: loud roar
          topics:
          - What sound does a dinosaur make?
          - Can you do a big roar?
        emotions:
        - What do you think it felt like to be THIS big?
        - Does the dinosaur look scary or amazing?
        - Would you be brave enough to stand next to it?
    tier_1:
      dimensions:
        appearance:
        - attribute: teeth_detail
          value: Sharp pointy teeth for chomping — some dinosaurs had flat teeth for plants instead
          topics:
          - What do you think these sharp teeth were for?
          - How are sharp teeth different from flat teeth?
        - attribute: legs_detail
          value: Strong legs for running, stomping, and escaping danger
          topics:
          - What could powerful legs help a dinosaur do?
          - Can you stomp like a dinosaur?
        senses:
        - attribute: stomping_sound
          value: Heavy stomping feet that shake the ground — BOOM BOOM
          topics:
          - What would it sound like when a dinosaur walked?
          - Can you stomp and make the floor shake?
        - attribute: scale_texture
          value: Bumpy, scaly skin that feels rough and tough
          topics:
          - What else feels bumpy and rough?
          - Why might tough skin help a dinosaur?
        emotions:
        - If you were a dinosaur in a giant jungle, would you feel brave or nervous?
        - What would you do if a volcano started rumbling?
        - How would you feel resting by a peaceful lake after a big adventure?
    tier_2:
      dimensions:
        appearance:
        - attribute: body_for_environment
          value: A dinosaur's body tells you about its life — sharp teeth mean it ate meat, powerful legs mean it moved fast,
            and scaly skin helped protect it.
          topics:
          - What can you guess about a dinosaur just by looking at its body?
          - Why might a dinosaur need both strong legs AND sharp teeth?
        senses:
        - attribute: environment_sounds
          value: Different places had different sounds — a jungle was full of buzzing and calls, a volcano rumbled and boomed,
            and a lake at sunset was quiet and calm.
          topics:
          - How do sounds change from a busy jungle to a quiet lake?
          - What sounds would you hear if you traveled back to dinosaur times?
        emotions:
        - The same dinosaur acts differently in different places — exploring in the jungle, running from a volcano, resting
          by a lake. How does where you are change how you feel?
        - When things around you change, how do your feelings change too?
        imagination:
        - If you had a time machine, which dinosaur time period would you visit?
        - What would the dinosaur say if it could tell you about its favorite place?
