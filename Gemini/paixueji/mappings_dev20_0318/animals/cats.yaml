- entity_id: animals_cat
  entity_name: Cat
  entity_name_cn: 猫
  domain: animals
  parent_category: mammals
  subcategory: cats
  primary_theme:
    theme_id: who_we_are
    weight: 0.45
    reasoning: A cat helps young children explore who they are through caring routines, feelings of comfort, and building
      a gentle relationship with a pet at home.
  secondary_themes:
  - theme_id: how_world_works
    weight: 0.3
    reasoning: Children notice how cats move, jump, and use whiskers, paws, and claws, then ask what body parts do and why
      cats purr or meow.
    context_trigger: when the child watches the cat purr or meow and asks what it means or how the cat makes that sound
  - theme_id: sharing_planet
    weight: 0.15
    reasoning: A cat invites discussion about living things sharing spaces with people, including safe care, respectful handling,
      and meeting the animal’s needs.
    context_trigger: when the child talks about feeding the cat, cleaning the litter, or asks where the cat should sleep safely
  - theme_id: how_we_express
    weight: 0.1
    reasoning: Children interpret a cat’s meows, purrs, ears, and tail as messages, and practice expressing kindness and calm
      communication with animals.
    context_trigger: when the child imitates a meow, points to the cat’s tail/ears, and says the cat is happy, scared, or
      mad
  primary_key_concepts:
  - concept_id: connection
    relevance: 1.0
    reasoning: Children naturally connect the cat to family life, noticing how pet and person interact through play, cuddles,
      and daily routines.
  - concept_id: perspective
    relevance: 0.9
    reasoning: A cat encourages children to imagine the world from the cat’s view, like why it hides, scratches, or avoids
      loud noises.
  - concept_id: responsibility
    relevance: 0.9
    reasoning: Caring for a cat builds responsibility through simple jobs like gentle handling, filling water, and remembering
      the pet’s needs.
  secondary_key_concepts:
  - concept_id: form
    relevance: 0.8
    reasoning: Children explore the cat’s form by naming body parts—fur, whiskers, paws—and comparing shapes and sizes with
      other animals.
  - concept_id: function
    relevance: 0.6
    reasoning: Kids ask what whiskers, claws, and sharp teeth are for, linking each part to actions like climbing, hunting
      toys, and balance.
  candidate_related_concepts:
  - concept_id: relationships
    discipline: social_studies
    reasoning: A cat helps children understand bonds between people and pets, including trust-building, boundaries, and friendly
      play.
  - concept_id: emotion
    discipline: pshe
    reasoning: Children notice and name emotions by reading cat signals and their own feelings when a cat cuddles, scratches,
      or runs away.
  - concept_id: safety
    discipline: pshe
    reasoning: Cats support safety learning such as gentle touch, giving space, washing hands, and knowing what to do if a
      cat seems upset.
  - concept_id: habitat
    discipline: science
    reasoning: Children compare where cats live and rest—home corners, beds, sunny spots—and what a safe habitat needs like
      warmth and water.
  tier_guidance:
    tier_0:
      dimensions:
        appearance:
        - attribute: body_covering
          value: fluffy fur
          topics:
          - Can you see the cat's fluffy fur?
          - What color is the fur?
        - attribute: paws
          value: soft little paws
          topics:
          - Can you find the cat's soft paws?
          - Are the paws tucked in or stretched out?
        - attribute: face
          value: peaceful sleeping face
          topics:
          - Are the cat's eyes open or closed?
          - Does the cat look cozy?
        - attribute: whiskers
          value: thin whiskers
          topics:
          - Can you see the long whiskers?
          - Do the whiskers look tickly?
        senses:
        - attribute: fur_feel
          value: soft and warm
          topics:
          - How do you think the fur feels?
          - Would it feel like a soft blanket?
        - attribute: sound
          value: soft purring
          topics:
          - What sound does a happy cat make?
          - Can you make a purring sound?
        emotions:
        - Does the cat look happy or sleepy?
        - How does seeing a cozy sleeping cat make you feel?
        - Do you think it's having a sweet dream right now?
    tier_1:
      dimensions:
        appearance:
        - attribute: sleep_posture
          value: Curled up in a ball with tail wrapped around
          topics:
          - Why do you think cats curl up when they sleep?
          - Have you ever curled up like a cat?
        - attribute: paw_pads
          value: Soft pads underneath the paws for quiet steps
          topics:
          - Why might cats have soft pads on their paws?
          - How are cat paws different from your feet?
        senses:
        - attribute: purring_vibration
          value: Gentle rumbling when comfortable
          topics:
          - When does a cat purr?
          - How is purring different from meowing?
        - attribute: whisker_twitch
          value: Whiskers twitch gently during sleep
          topics:
          - Have you ever seen a cat's whiskers move while sleeping?
          - What do you think makes them twitch?
        emotions:
        - What do you think makes a cat feel safe enough to fall asleep?
        - How does it feel when a warm, fluffy cat sits near you?
        imagination:
        - What do you think the cat is dreaming about right now?
        - If you could peek into a cat's dream, what would you see?
    tier_2:
      dimensions:
        appearance:
        - attribute: fur_warmth
          value: Fluffy fur traps air close to the body, keeping the cat warm even in cool spots.
          topics:
          - Why does a cat's fur help it stay warm?
          - How is fur like wearing a cozy jacket?
        - attribute: closed_eyes_meaning
          value: When a cat closes its eyes near you, it often means it feels safe and trusts you.
          topics:
          - What does it mean when a cat closes its eyes around you?
          - How do you show someone you feel safe with them?
        senses:
        - attribute: purring_meaning
          value: Cats purr when they feel safe or are trying to calm themselves — the vibration may even help healing.
          topics:
          - Why do cats purr in different situations?
          - Do you have something that helps you feel calm?
        emotions:
        - How can you tell if a cat trusts you?
        - What does it feel like to take care of a sleeping animal?
        imagination:
        - If cats could dream about anything, what adventures would they have?
        - What would a cat's perfect dream world look like?
        narrative:
        - Tell a story about what this cat might be dreaming right now.
        - Make up an adventure about a cat who discovers a magical dream garden.
