description: "Learning frameworks defining exploration approaches for each topic domain"

# ============================================================
# DOMAIN 1: ANIMALS (8 frameworks)
# ============================================================

frameworks:
  - topic_id: animal_appearance
    name: Animal Appearance
    domain: animals
    learning_objectives:
      - Recognize external features of animals
      - Learn to observe and describe
      - Understand the relationship between features and function
    exploration_dimensions:
      - dimension_id: color
        name: Color
        question_pattern: "What color is {object}?"
        tier_focus:
          tier1: Basic color recognition
          tier2: Color changes/patterns
          tier3: Color function (camouflage, warning)
      - dimension_id: shape
        name: Shape
        question_pattern: "What shape is {object}'s {part}?"
        tier_focus:
          tier1: Basic shapes
          tier2: Shape comparison
          tier3: Shape and function relationship
      - dimension_id: size
        name: Size
        question_pattern: "Is {object} big or small?"
        tier_focus:
          tier1: Big/small comparison
          tier2: Compare to familiar objects
          tier3: Specific measurements
      - dimension_id: body_parts
        name: Body Parts
        question_pattern: "Can you find the {object}'s {part}?"
        tier_focus:
          tier1: Name basic parts
          tier2: Count and compare parts
          tier3: Specialized parts and purposes

  - topic_id: animal_behavior
    name: Animal Behavior
    domain: animals
    learning_objectives:
      - Observe how animals act and move
      - Understand why animals do what they do
      - Recognize patterns in animal actions
    exploration_dimensions:
      - dimension_id: movement
        name: Movement
        question_pattern: "How does {object} move?"
        tier_focus:
          tier1: Basic movements (walk, run, fly)
          tier2: Why they move that way
          tier3: Adaptations for movement
      - dimension_id: sounds
        name: Sounds
        question_pattern: "What sound does {object} make?"
        tier_focus:
          tier1: Imitate the sound
          tier2: Why they make sounds
          tier3: Communication meanings
      - dimension_id: social
        name: Social Behavior
        question_pattern: "Does {object} live alone or with others?"
        tier_focus:
          tier1: Alone vs. group
          tier2: Family structures
          tier3: Pack/herd dynamics

  - topic_id: animal_senses
    name: Animal Senses
    domain: animals
    learning_objectives:
      - Learn how animals perceive the world
      - Compare animal senses to human senses
      - Understand sensory adaptations
    exploration_dimensions:
      - dimension_id: sight
        name: Sight
        question_pattern: "How does {object} see the world?"
        tier_focus:
          tier1: Eyes location and size
          tier2: What they can see
          tier3: Special vision abilities
      - dimension_id: hearing
        name: Hearing
        question_pattern: "How well can {object} hear?"
        tier_focus:
          tier1: Ear shape and location
          tier2: What they can hear
          tier3: Hearing range comparisons
      - dimension_id: smell
        name: Smell
        question_pattern: "How does {object} use its nose?"
        tier_focus:
          tier1: Sniffing behavior
          tier2: What smells they detect
          tier3: Sensitivity comparisons

  - topic_id: animal_lifecycle
    name: Animal Lifecycle
    domain: animals
    learning_objectives:
      - Understand that living things change
      - Recognize different stages of growth
      - Feel the relationship between time and change
    exploration_dimensions:
      - dimension_id: initial_form
        name: Initial Form
        question_pattern: "What did {object} look like when little?"
        tier_focus:
          tier1: Appearance differences
          tier2: Why they're different
          tier3: Reasons for changes
      - dimension_id: change_process
        name: Change Process
        question_pattern: "How did {object} become what it is now?"
        tier_focus:
          tier1: Describe the changes
          tier2: Stages of change
          tier3: Metamorphosis mechanisms

  - topic_id: animal_habitat
    name: Animal Habitat
    domain: animals
    learning_objectives:
      - Understand where animals live
      - Learn why animals live in certain places
      - Recognize adaptation to environment
    exploration_dimensions:
      - dimension_id: location
        name: Location
        question_pattern: "Where does {object} live?"
        tier_focus:
          tier1: Water, land, sky
          tier2: Specific habitat types
          tier3: Why this location suits them
      - dimension_id: needs
        name: Needs
        question_pattern: "What does {object} need from its home?"
        tier_focus:
          tier1: Food and shelter
          tier2: Specific requirements
          tier3: Ecosystem relationships

  - topic_id: animal_adaptation
    name: Animal Adaptation
    domain: animals
    learning_objectives:
      - Understand how animals are suited to their lives
      - Recognize specialized body parts
      - Connect form to function
    exploration_dimensions:
      - dimension_id: specialized_parts
        name: Specialized Parts
        question_pattern: "Why does {object} have that special {part}?"
        tier_focus:
          tier1: Notice special features
          tier2: What the feature does
          tier3: How it helps survival
      - dimension_id: comparison
        name: Comparison
        question_pattern: "Why is {object}'s {part} different from others?"
        tier_focus:
          tier1: Notice differences
          tier2: Connect to diet/behavior
          tier3: Evolutionary explanations

  - topic_id: animal_breathing
    name: Animal Breathing
    domain: animals
    learning_objectives:
      - Understand different ways animals get oxygen
      - Compare breathing methods
      - Recognize environmental adaptations
    exploration_dimensions:
      - dimension_id: method
        name: Breathing Method
        question_pattern: "How does {object} breathe?"
        tier_focus:
          tier1: Lungs vs. gills
          tier2: How the system works
          tier3: Gas exchange science

  - topic_id: animal_communication
    name: Animal Communication
    domain: animals
    learning_objectives:
      - Understand how animals communicate
      - Recognize body language
      - Learn about different communication methods
    exploration_dimensions:
      - dimension_id: body_language
        name: Body Language
        question_pattern: "What is {object} telling us with its body?"
        tier_focus:
          tier1: Happy/sad/scared signs
          tier2: Specific body signals
          tier3: Complex communication systems

