            expected_answers: ["bake", "oven", "cook", "heat"]
            correct_feedback: "Baking in a hot oven! The heat makes the dough firm up, turns the outside golden brown, and kills the yeast. Now it's yummy bread!"
            hint: "Where does bread go to turn from squishy dough into firm, golden bread?"
