  # ---------------------------------------------------------
  # RAIN - Tier 2: Water Cycle
  # ---------------------------------------------------------
  - id: pathway_rain_water_cycle_tier2
    object_id: nature_rain
    object_name: Rain
    age_tier: 2
    default_rounds: 4
    max_rounds: 5
    topic_config:
      primary_topic: water_cycle
      secondary_topics: ["weather", "science"]
      topic_switch_allowed: true
    initial_response_template: "Rain! Did you know the same water keeps going around and around? Let's follow its journey!"
    steps:
      - round: 1
        topic_options:
          - topic_id: water_cycle
            attribute: evaporation
            is_default: true
            question: "When the sun shines on puddles, rivers, and oceans, the water slowly disappears into the air. What is this process called?"
            question_type: knowledge
            expected_answers: ["evaporation", "evaporates", "drying up", "going into air"]
            correct_feedback: "Evaporation! The sun's heat turns liquid water into invisible water vapor that floats up into the sky!"
            hint: "The water doesn't actually disappear - it turns into a gas and goes up. What's this called?"
      - round: 2
        topic_options:
          - topic_id: water_cycle
            attribute: clouds
            is_default: true
            question: "The water vapor rises up and gets cold high in the sky. When it gets cold, what does it turn into?"
            question_type: knowledge
            expected_answers: ["clouds", "water droplets", "tiny drops"]
            correct_feedback: "Clouds! When water vapor cools down, it turns back into tiny water droplets. Millions of these droplets together make a cloud!"
            hint: "What do you see in the sky that's white and fluffy? That's where the water goes!"
      - round: 3
        topic_options:
          - topic_id: water_cycle
            attribute: precipitation
            is_default: true
            question: "When clouds get heavy with water droplets, the water falls back down. What do we call this?"
            question_type: knowledge
            expected_answers: ["rain", "precipitation", "snow", "falling water"]
            correct_feedback: "Precipitation - which includes rain, snow, sleet, and hail! When the droplets get too heavy, they fall back to Earth!"
            hint: "Water falling from clouds has a special name. Rain is one kind..."
      - round: 4
        topic_options:
          - topic_id: water_cycle
            attribute: cycle_complete
            is_default: true
            question: "Rain falls on land, goes into rivers, flows to the ocean, evaporates, becomes clouds, falls as rain again... Why is this called a 'cycle'?"
            question_type: reason
            expected_answers: ["goes around", "repeats", "circle", "never ends", "over and over"]
            correct_feedback: "Because it goes around and around forever! The water you drink might have been rain a dinosaur walked through! Water keeps recycling!"
            hint: "A cycle means something that goes around and starts over. Does the water's journey end?"
    activity_suggestions:
      - type: water_cycle_diagram
        name: "Draw the Water Cycle"
        topic_match: 1.0
      - type: experiment
        name: "Make a Cloud in a Jar"
        topic_match: 0.9

