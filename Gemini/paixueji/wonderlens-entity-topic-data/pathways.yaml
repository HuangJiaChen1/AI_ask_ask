    initial_response_template: "The moon! Let's discover why it changes shape throughout the month!"
    steps:
      - round: 1
        topic_options:
          - topic_id: moon_phases
            attribute: shapes
            is_default: true
            question: "The moon appears to change shape. Can you name some of these shapes?"
            question_type: list
            expected_answers: ["full", "half", "crescent", "new", "quarter"]
            correct_feedback: "Great! Full moon (circle), half moon, crescent (banana shape), and new moon (when we can't see it). These are called phases!"
            hint: "Think about different shapes you've seen the moon make - circle, half circle, banana..."
      - round: 2
        topic_options:
          - topic_id: moon_phases
            attribute: reason
            is_default: true
            question: "The moon doesn't really change shape - it's always round like a ball. So why does it look different each night?"
            question_type: reason
            expected_answers: ["light changes", "sun lights different parts", "position changes", "we see different parts"]
            correct_feedback: "The sun always lights up half the moon. But as the moon moves around Earth, we see different amounts of that lit-up half!"
            hint: "Imagine a ball half in shadow. As you walk around it, you see different amounts of the bright half."
      - round: 3
        topic_options:
          - topic_id: moon_phases
            attribute: cycle
            is_default: true
            question: "How long does it take for the moon to go through all its phases - from full moon back to full moon?"
            question_type: knowledge
            expected_answers: ["month", "29 days", "30 days", "about a month"]
            correct_feedback: "About one month - actually 29.5 days! That's why we call them MONTHs - it comes from MOON! The moon has been our calendar since ancient times!"
            hint: "Think about when you see a full moon. How long until the next full moon?"
      - round: 4
        topic_options:
          - topic_id: space
            attribute: earth_orbit
            is_default: true
            question: "Earth goes around the sun. What does the moon go around?"
            question_type: knowledge
            expected_answers: ["Earth", "us", "our planet"]
            correct_feedback: "The moon orbits Earth! So Earth goes around the sun, and the moon goes around Earth. It's like a dance in space!"
            hint: "The moon is called Earth's natural satellite. What does it orbit?"
    activity_suggestions:
      - type: phase_tracker
        name: "Moon Phase Calendar"
        topic_match: 1.0
      - type: model
        name: "Moon Phase Demonstration"
        topic_match: 0.9

