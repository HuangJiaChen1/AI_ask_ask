  # ---------------------------------------------------------
  # RAINBOW - Tier 2: Light Science
  # ---------------------------------------------------------
  - id: pathway_rainbow_science_tier2
    object_id: nature_rainbow
    object_name: Rainbow
    age_tier: 2
    default_rounds: 4
    max_rounds: 5
    topic_config:
      primary_topic: light_phenomenon
      secondary_topics: ["physics", "weather"]
      topic_switch_allowed: true
    initial_response_template: "A rainbow! Let's discover the science behind this beautiful light show!"
    steps:
      - round: 1
        topic_options:
          - topic_id: light_phenomenon
            attribute: white_light
            is_default: true
            question: "Sunlight looks white or yellow, but it actually contains all colors! What do you think happens to separate those colors?"
            question_type: reason
            expected_answers: ["splits", "separates", "water splits it", "bends"]
            correct_feedback: "Light bends when it goes through water! Each color bends a different amount, so they spread apart. We see all the colors!"
            hint: "Water can do something to light that makes the colors spread out."
      - round: 2
        topic_options:
          - topic_id: light_phenomenon
            attribute: rain_drops
            is_default: true
            question: "We need both sun AND rain for a rainbow. What do raindrops do to the sunlight?"
            question_type: reason
            expected_answers: ["bend it", "split colors", "like prism", "separate colors"]
            correct_feedback: "Each raindrop acts like a tiny prism! It bends the light, splits it into colors, and bounces it back to your eyes. Millions of drops make a rainbow!"
            hint: "Think of each raindrop as a tiny piece of glass that light goes through."
      - round: 3
        topic_options:
          - topic_id: light_phenomenon
            attribute: position
            is_default: true
            question: "To see a rainbow, where does the sun need to be - in front of you or behind you?"
            question_type: knowledge
            expected_answers: ["behind", "behind me", "at my back"]
            correct_feedback: "Behind you! The sun shines from behind, hits the rain in front, and the colors bounce back to your eyes. That's why you often see rainbows in the afternoon when the sun is getting lower!"
            hint: "Think about which direction rainbows appear. Where is the sun compared to you?"
      - round: 4
        topic_options:
          - topic_id: physics
            attribute: make_rainbow
            is_default: true
            question: "You don't need rain to make a rainbow - you can make one with a garden hose! How would you do it?"
            question_type: reason
            expected_answers: ["spray water", "mist", "sun behind", "fine spray"]
            correct_feedback: "Spray a fine mist with the sun behind you! The tiny water drops will split the light just like raindrops do. You made your own rainbow!"
            hint: "What do you need? Sunlight and tiny water drops..."
    activity_suggestions:
      - type: experiment
        name: "Make a Rainbow with a Hose"
        topic_match: 1.0
      - type: prism_experiment
        name: "Split Light with a Prism"
        topic_match: 0.9

