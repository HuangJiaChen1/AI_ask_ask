  # ---------------------------------------------------------
  # AIRPLANE - Tier 2: Flight
  # ---------------------------------------------------------
  - id: pathway_airplane_flight_tier2
    object_id: vehicle_airplane
    object_name: Airplane
    age_tier: 2
    default_rounds: 4
    max_rounds: 5
    topic_config:
      primary_topic: flight_principle
      secondary_topics: ["vehicle_parts", "air_transport"]
      topic_switch_allowed: true
    initial_response_template: "An airplane! Have you ever wondered how something so heavy can fly? Let's find out!"
    steps:
      - round: 1
        topic_options:
          - topic_id: flight_principle
            attribute: weight
            is_default: true
            question: "Airplanes are made of heavy metal and carry lots of people. How do you think something so heavy can fly?"
            question_type: reason
            expected_answers: ["wings", "engines", "fast", "special shape"]
            correct_feedback: "Great question! It's because of the wings and how fast the airplane moves through the air! Let's learn more!"
            hint: "What special parts does an airplane have that a car doesn't?"
      - round: 2
        topic_options:
          - topic_id: flight_principle
            attribute: wings_shape
            is_default: true
            question: "Airplane wings have a special shape - they're curved on top and flatter on the bottom. When air moves over this shape, what do you think happens?"
            question_type: reason
            expected_answers: ["lifts up", "push up", "helps fly", "air pushes"]
            correct_feedback: "Air flowing over the curved top moves faster than under the flat bottom. This creates a push upward called LIFT!"
            hint: "When you stick your hand out a car window, different angles make your hand go up or down. Wings work the same way!"
      - round: 3
        topic_options:
          - topic_id: flight_principle
            attribute: takeoff
            is_default: true
            question: "Before taking off, airplanes speed up on a long runway. Why do they need to go fast before flying?"
            question_type: reason
            expected_answers: ["need speed", "more lift", "wings need fast air", "push up"]
            correct_feedback: "Speed makes lift! The wings need lots of air flowing over them quickly to create enough push to lift the heavy plane off the ground!"
            hint: "Remember how wings create lift? They need air moving over them. How do you get lots of air moving?"
      - round: 4
        topic_options:
          - topic_id: air_transport
            attribute: altitude
            is_default: true
            question: "Airplanes fly very high - above the clouds! Why do you think they fly so high instead of just above the trees?"
            question_type: reason
            expected_answers: ["smoother", "less bumpy", "faster", "no obstacles", "above weather"]
            correct_feedback: "It's smoother up high! There's less wind and weather to bump the plane around. Plus, there are no mountains or buildings to crash into!"
            hint: "Think about what's in the way near the ground - buildings, trees, mountains. What about high up?"
    activity_suggestions:
      - type: paper_airplane
        name: "Make a Paper Airplane"
        topic_match: 1.0
      - type: experiment
        name: "Test Wing Shapes"
        topic_match: 0.9

