            question_type: reason
            expected_answers: ["looked similar", "didn't know narwhals", "wanted to believe", "never seen narwhal"]
            correct_feedback: "They'd never seen narwhals! When they found the spiral horns, unicorn legends seemed like the best explanation. People believed what they wanted to believe!"
            hint: "If you found a long spiral horn and didn't know about narwhals, what might you think?"
      - round: 4
        topic_options:
          - topic_id: critical_thinking
            attribute: value_of_imagination
            is_default: true
            question: "Even though unicorns aren't real, why do you think people still love unicorn stories?"
            question_type: reflection
            expected_answers: ["fun", "beautiful", "magic", "make us happy", "imagination is good"]
            correct_feedback: "Imaginary things are valuable too! They inspire creativity, bring joy, and remind us that magic lives in our minds. Stories don't have to be real to be meaningful!"
            hint: "Think about how you feel when you hear unicorn stories. Is that feeling valuable?"
    activity_suggestions:
      - type: research
        name: "Real Animals with Horns"
        topic_match: 0.9
      - type: creative_writing
        name: "Write a Unicorn Legend"
        topic_match: 1.0

  # ---------------------------------------------------------
  # ROBOT - Tier 1: Technology
  # ---------------------------------------------------------
  - id: pathway_robot_technology_tier1
    object_id: imagine_robot
    object_name: Robot
    age_tier: 1
    default_rounds: 4
    max_rounds: 5
    topic_config:
      primary_topic: technology
      secondary_topics: ["robot_movement", "robot_function"]
      topic_switch_allowed: true
    initial_response_template: "Beep boop! A robot! Robots are machines that can move and do tasks!"
    steps:
      - round: 1
        topic_options:
          - topic_id: technology
            attribute: parts
            is_default: true
            question: "What parts does this robot have? Can you see arms, wheels, eyes, or other parts?"
            question_type: observation
            expected_answers: ["arms", "wheels", "eyes", "head", "legs", "buttons"]
            correct_feedback: "Good looking! Robots have different parts for different jobs - wheels to move, arms to grab, cameras to see!"
            hint: "Look at the robot from head to toe (or top to bottom). What different parts can you spot?"
      - round: 2
        topic_options:
          - topic_id: robot_movement
            attribute: moving
            is_default: true
            question: "How do you think this robot moves? Does it walk, roll, fly, or move another way?"
            question_type: prediction
            expected_answers: ["walks", "rolls", "wheels", "legs", "flies"]
            correct_feedback: "Robots can move in so many ways! Wheels for rolling, legs for walking, propellers for flying - it depends on what job they need to do!"
            hint: "Look at the bottom of the robot. What would help it get around?"
          - topic_id: robot_movement
            attribute: imitation
            is_default: false
            trigger_keywords: ["move", "walk", "dance"]
            question: "Can you move like a robot? Show me your best robot walk!"
            question_type: imitation
            expected_answers: ["doing robot moves", "stiff movements", "beeping"]
            correct_feedback: "Great robot moves! Robots often move in a stiff, mechanical way because their joints work differently from our bendy joints!"
            hint: "Think about moving in a jerky, stiff way - not smooth like a person!"
      - round: 3
        topic_options:
          - topic_id: robot_function
            attribute: job
            is_default: true
            question: "What job do you think this robot does? Does it help clean, build things, or do something else?"
            question_type: prediction
            expected_answers: ["clean", "help people", "build", "play", "work"]
            correct_feedback: "Robots are built to do specific jobs! Some vacuum floors, some build cars, some explore space. Each robot is designed for its job!"
            hint: "Look at what the robot has - arms for grabbing? A vacuum? That tells you its job!"
      - round: 4
        topic_options:
          - topic_id: technology
            attribute: power
            is_default: true
            question: "Robots need power to work, like toys need batteries. What do you think powers this robot?"
            question_type: knowledge
            expected_answers: ["batteries", "electricity", "charging", "plugging in"]
            correct_feedback: "Electricity! Robots run on batteries or plug into power, just like your toys and tablets. Without power, robots can't move or think!"
            hint: "What do you need to put in your toy car to make it go?"
    activity_suggestions:
      - type: robot_game
        name: "Simon Says: Robot Edition"
        topic_match: 1.0
      - type: building
        name: "Build a Robot from Boxes"
        topic_match: 0.9

  # ---------------------------------------------------------
  # ROBOT - Tier 2: Programming
  # ---------------------------------------------------------
  - id: pathway_robot_programming_tier2
    object_id: imagine_robot
    object_name: Robot
    age_tier: 2
    default_rounds: 4
    max_rounds: 5
    topic_config:
      primary_topic: programming
      secondary_topics: ["robotics", "technology"]
      topic_switch_allowed: true
    initial_response_template: "A robot! Robots are amazing, but did you know they only do exactly what people tell them? Let's learn how!"
    steps:
      - round: 1
        topic_options:
          - topic_id: programming
            attribute: instructions
            is_default: true
            question: "Robots follow instructions called programs. If you want a robot to make a sandwich, why can't you just say 'make a sandwich'?"
            question_type: reason
            expected_answers: ["needs steps", "doesn't understand", "needs details", "step by step"]
            correct_feedback: "Robots need EVERY tiny step! 'Get bread, open bag, take out two slices, get peanut butter, open jar...' You have to tell them everything!"
            hint: "Think about explaining to someone who's never seen food before. How detailed would you need to be?"
      - round: 2
        topic_options:
          - topic_id: programming
            attribute: sequence
            is_default: true
            question: "Let's program a robot to walk across the room. What steps would you give it? Think about every little movement!"
            question_type: sequence
            expected_answers: ["lift foot", "move forward", "put down", "repeat", "step by step"]
            correct_feedback: "Great programming! 'Lift right foot, move forward 1 step, put down, lift left foot, move forward 1 step, put down, repeat!' Robots need exact instructions!"
            hint: "Break down walking into the tiniest movements. What happens first? Then what?"
          - topic_id: robotics
            attribute: sensors
            is_default: false
            trigger_keywords: ["see", "sense", "detect"]
            question: "Robots use sensors to understand the world - cameras to see, microphones to hear. Why would a vacuum robot need sensors?"
            question_type: reason
            expected_answers: ["not hit walls", "find dirt", "avoid things", "know where to go"]
            correct_feedback: "To not crash into things! Sensors help robots know where walls are, where furniture is, and where they've already cleaned. Smart!"
            hint: "What would happen if a vacuum robot couldn't tell where the walls were?"
      - round: 3
        topic_options:
          - topic_id: programming
            attribute: bugs
            is_default: true
            question: "Sometimes programs have mistakes called 'bugs.' If a robot keeps spinning in circles instead of walking straight, what might be wrong?"
            question_type: reason
            expected_answers: ["wrong instruction", "bug", "mistake", "told it wrong"]
            correct_feedback: "There's a bug in the program! Maybe someone told it to turn instead of go straight. Programmers have to find and fix bugs - it's like solving a puzzle!"
            hint: "The robot does exactly what it's told. So if it's doing the wrong thing, where's the problem?"
      - round: 4
        topic_options:
          - topic_id: robotics
            attribute: real_robots
            is_default: true
            question: "There are robots on Mars right now! They're called rovers. Why do we send robots instead of people?"
            question_type: reason
            expected_answers: ["dangerous", "don't need air", "don't need food", "can survive"]
            correct_feedback: "Mars is dangerous for humans - no air, extreme temperatures! Robots don't need to breathe or eat, and they can survive where humans can't. Robot explorers!"
            hint: "What do humans need to survive that robots don't need?"
    activity_suggestions:
      - type: programming_game
        name: "Be the Robot (Follow Exact Instructions)"
        topic_match: 1.0
      - type: sequence_cards
        name: "Put the Steps in Order"
        topic_match: 0.9

  # ---------------------------------------------------------
  # FAIRY - Tier 1: Imagination
  # ---------------------------------------------------------
  - id: pathway_fairy_imagination_tier1
    object_id: imagine_fairy
    object_name: Fairy
    age_tier: 1
    default_rounds: 4
    max_rounds: 5
    topic_config:
      primary_topic: mythology
      secondary_topics: []
      topic_switch_allowed: true
    initial_response_template: "A fairy! A tiny magical creature with beautiful wings!"
    steps:
      - round: 1
        topic_options:
          - topic_id: mythology
            attribute: appearance
            is_default: true
            question: "What does a fairy look like? What special things does it have?"
            question_type: descriptive
            expected_answers: ["wings", "small", "tiny", "sparkly", "pretty dress"]
            correct_feedback: "Fairies are tiny magical beings with beautiful wings! They often wear sparkly clothes and spread magic dust!"
            hint: "Fairies are very small and have something that helps them fly..."
      - round: 2
        topic_options:
          - topic_id: mythology
            attribute: wings
            is_default: true
            question: "Fairies have wings! What do their wings remind you of? What animal has wings like that?"
            question_type: comparison
            expected_answers: ["butterfly", "dragonfly", "insect", "bird"]
            correct_feedback: "Many fairies have wings like butterflies or dragonflies - colorful and see-through! They flutter their wings to fly around!"
            hint: "Think about insects with pretty, see-through wings..."
      - round: 3
        topic_options:
          - topic_id: mythology
            attribute: magic
            is_default: true
            question: "What magical things can fairies do in stories?"
            question_type: creative
            expected_answers: ["grant wishes", "fly", "sparkle", "magic dust", "make things grow"]
            correct_feedback: "Wonderful! In stories, fairies can grant wishes, make flowers bloom, and sprinkle magic fairy dust that makes sparkles!"
            hint: "Think about fairy tales you've heard. What special powers do fairies have?"
      - round: 4
        topic_options:
          - topic_id: mythology
            attribute: home
            is_default: true
            question: "Where do you think fairies live? What kind of home would be right for something so tiny?"
            question_type: creative
            expected_answers: ["mushroom", "flower", "tree", "garden", "tiny house"]
            correct_feedback: "Great imagination! Stories say fairies live in mushroom houses, inside flowers, or in hidden gardens. Their homes are as magical as they are!"
            hint: "Think about tiny spaces that would fit a fairy-sized creature..."
    activity_suggestions:
      - type: creative_drawing
        name: "Design a Fairy Home"
        topic_match: 1.0
      - type: story
        name: "Make Up a Fairy Story"
        topic_match: 0.9

  # ---------------------------------------------------------
  # FAIRY - Tier 2: Nature Connection
  # ---------------------------------------------------------
  - id: pathway_fairy_nature_tier2
    object_id: imagine_fairy
    object_name: Fairy
    age_tier: 2
    default_rounds: 4
    max_rounds: 5
    topic_config:
      primary_topic: mythology
      secondary_topics: ["nature_connection"]
      topic_switch_allowed: true
    initial_response_template: "A fairy! In stories, fairies are deeply connected to nature. Let's explore their magical world!"
    steps:
      - round: 1
        topic_options:
          - topic_id: mythology
            attribute: nature_role
            is_default: true
            question: "In many stories, fairies have special jobs in nature. What do you think fairies might do to help flowers, trees, or animals?"
            question_type: creative
            expected_answers: ["help flowers grow", "paint leaves", "care for animals", "make rain"]
            correct_feedback: "Beautiful ideas! Stories say fairies paint the autumn leaves, help flowers bloom, guide butterflies, and take care of the forest!"
            hint: "Think about all the beautiful things in nature. What if tiny magical helpers made them happen?"
      - round: 2
        topic_options:
          - topic_id: nature_connection
            attribute: seasons
            is_default: true
            question: "Some stories have different fairies for each season - spring, summer, fall, and winter fairies. What would a spring fairy do that's different from a winter fairy?"
            question_type: comparison
            expected_answers: ["spring wakes flowers", "winter brings snow", "different jobs", "different magic"]
            correct_feedback: "Great thinking! Spring fairies might wake up sleeping flowers, while winter fairies might paint frost on windows and help snowflakes fall!"
            hint: "What happens in spring? What happens in winter? Different fairies for different jobs!"
      - round: 3
        topic_options:
          - topic_id: mythology
            attribute: creatures
            is_default: true
            question: "Fairy stories often mention other magical creatures too. Can you name some magical creatures that might be friends with fairies?"
            question_type: list
            expected_answers: ["unicorn", "dragon", "elf", "mermaid", "gnome", "pixie"]
            correct_feedback: "You know so many! Unicorns, pixies, elves, and even friendly dragons might live alongside fairies in magical stories!"
            hint: "Think about other magical beings from stories and movies you know."
      - round: 4
        topic_options:
          - topic_id: nature_connection
            attribute: real_magic
            is_default: true
            question: "Fairies aren't real, but nature does seem magical sometimes. What real thing in nature feels like magic to you?"
            question_type: reflection
            expected_answers: ["butterflies", "flowers", "rainbow", "fireflies", "snow"]
            correct_feedback: "Yes! Fireflies glowing in the dark, caterpillars becoming butterflies, flowers opening to the sun - real nature can feel as magical as fairy tales!"
            hint: "Think about amazing things you've seen in nature that made you say 'wow!'"
    activity_suggestions:
      - type: nature_walk
        name: "Find Fairy Homes in Nature"
        topic_match: 1.0
      - type: creative_writing
        name: "Write a Fairy Adventure"
        topic_match: 0.9
