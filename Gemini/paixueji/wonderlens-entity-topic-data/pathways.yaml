  # ---------------------------------------------------------
  # BICYCLE - Tier 2: Balance
  # ---------------------------------------------------------
  - id: pathway_bicycle_balance_tier2
    object_id: vehicle_bicycle
    object_name: Bicycle
    age_tier: 2
    default_rounds: 4
    max_rounds: 5
    topic_config:
      primary_topic: physics
      secondary_topics: ["vehicle_parts", "skills"]
      topic_switch_allowed: true
    initial_response_template: "A bicycle! Here's something cool - a bicycle has only two wheels, but it doesn't fall over when you ride it. Let's find out why!"
    steps:
      - round: 1
        topic_options:
          - topic_id: physics
            attribute: standing_still
            is_default: true
            question: "If a bicycle just stands still, can it balance on its own? What happens?"
            question_type: prediction
            expected_answers: ["falls over", "tips", "needs kickstand", "no"]
            correct_feedback: "Right! A still bicycle tips over. It needs a kickstand or someone holding it. So how does it stay up when moving?"
            hint: "Think about what happens if you just let go of a bicycle that's standing still."
      - round: 2
        topic_options:
          - topic_id: physics
            attribute: spinning
            is_default: true
            question: "When you ride, the wheels spin very fast. Spinning things are harder to tip over. Have you ever seen a spinning top?"
            question_type: connection
            expected_answers: ["yes", "stays up", "spins and balances", "like a top"]
            correct_feedback: "Exactly! A spinning top stays up, but falls when it stops. Spinning bicycle wheels work the same way - they help keep the bike up!"
            hint: "A top falls over when it's still, but when it spins it stays standing. What's similar?"
      - round: 3
        topic_options:
          - topic_id: physics
            attribute: steering
            is_default: true
            question: "When you feel the bike tipping left, you turn the handlebars a little left too. Why does this help?"
            question_type: reason
            expected_answers: ["moves bike under you", "catches balance", "straightens up"]
            correct_feedback: "Smart! Turning into the lean moves the bike back under your body. It's like taking a step to catch yourself when you're falling!"
            hint: "When you're falling, you might put your foot out to catch yourself. How does the bike 'catch' itself?"
      - round: 4
        topic_options:
          - topic_id: physics
            attribute: practice
            is_default: true
            question: "After lots of practice, balancing a bike becomes easy. You don't even think about it! Why?"
            question_type: reason
            expected_answers: ["brain learns", "automatic", "muscle memory", "practice"]
            correct_feedback: "Your brain and body learn! At first, you think about every little movement. After practice, your body does it automatically. This is called 'muscle memory'!"
            hint: "Think about other things you've learned - walking, eating with a spoon. Do you still have to think hard about them?"
    activity_suggestions:
      - type: balance_practice
        name: "Balance Challenge Games"
        topic_match: 1.0
      - type: spinning_experiment
        name: "Spinning Top Experiment"
        topic_match: 0.9

