total_pathways: 52
description: "Complete set of WonderLens educational pathways covering animals, plants, food, vehicles, natural phenomena, and imaginative objects"

# ============================================================
# SECTION 1: ANIMALS (12 pathways)
# ============================================================

pathways:
  # ---------------------------------------------------------
  # DOG - Tier 1: Appearance
  # ---------------------------------------------------------
  - id: pathway_dog_appearance_tier1
    object_id: animal_dog
    object_name: Dog
    age_tier: 1
    default_rounds: 4
    max_rounds: 5
    topic_config:
      primary_topic: animal_appearance
      secondary_topics: ["animal_behavior"]
      topic_switch_allowed: true
    initial_response_template: "Wow! You found a dog! What a fluffy friend!"
    steps:
      - round: 1
        topic_options:
          - topic_id: animal_appearance
            attribute: color
            is_default: true
            question: "What color is this doggy? Is it brown, white, or black?"
            question_type: choice
            expected_answers: ["brown", "white", "black", "golden", "spotted"]
            correct_feedback: "Yes! You're right! This doggy has such pretty fur!"
            hint: "Look at the doggy's fur. What color do you see?"
      - round: 2
        topic_options:
          - topic_id: animal_appearance
            attribute: size
            is_default: true
            question: "Is this a big dog or a small dog?"
            question_type: choice
            expected_answers: ["big", "small", "medium", "large", "little"]
            correct_feedback: "Good looking! Some dogs are big like wolves, and some are tiny like toys!"
            hint: "Compare it to yourself. Is it bigger or smaller than you?"
          - topic_id: animal_behavior
            attribute: movement
            is_default: false
            trigger_keywords: ["running", "jumping", "moving"]
            question: "What is the doggy doing? Running or sitting?"
            question_type: choice
            expected_answers: ["running", "sitting", "walking", "sleeping", "playing"]
            correct_feedback: "Dogs love to run and play! They have four strong legs!"
            hint: "Watch the doggy. Is it moving or staying still?"
      - round: 3
        topic_options:
          - topic_id: animal_appearance
            attribute: body_parts
            is_default: true
            question: "Can you find the doggy's tail? Where is it?"
            question_type: open
            expected_answers: ["back", "behind", "there", "bottom"]
            correct_feedback: "Yes! The tail is at the back! Dogs wag their tails when they're happy!"
            hint: "Look at the back of the doggy. What's moving?"
      - round: 4
        topic_options:
          - topic_id: animal_behavior
            attribute: sound
            is_default: true
            question: "How does a doggy say hello? Can you make the sound?"
            question_type: imitation
            expected_answers: ["woof", "bark", "arf", "bow wow"]
            correct_feedback: "Woof woof! Great job! Dogs bark to talk to us!"
            hint: "Dogs make a sound like 'woof woof'! Can you try?"
    activity_suggestions:
      - type: sound_game
        name: "Animal Sounds Guessing Game"
        topic_match: 0.9
      - type: flashcard
        name: "Dog Breeds Cards"
        topic_match: 1.0

  # ---------------------------------------------------------
  # DOG - Tier 2: Senses
  # ---------------------------------------------------------
  - id: pathway_dog_senses_tier2
    object_id: animal_dog
    object_name: Dog
    age_tier: 2
    default_rounds: 4
    max_rounds: 5
    topic_config:
      primary_topic: animal_senses
      secondary_topics: ["animal_behavior", "animal_appearance"]
      topic_switch_allowed: true
    initial_response_template: "A dog! Did you know dogs have super senses? Let's explore!"
    steps:
      - round: 1
        topic_options:
          - topic_id: animal_appearance
            attribute: nose
            is_default: true
            question: "Look at the dog's nose. What shape is it? What color?"
            question_type: descriptive
            expected_answers: ["black", "wet", "round", "big", "shiny"]
            correct_feedback: "Good observation! A dog's nose is usually wet and black. And it's very special!"
            hint: "Look at the front of the dog's face. What do you see?"
      - round: 2
        topic_options:
          - topic_id: animal_senses
            attribute: smell
            is_default: true
            question: "Why do dogs sniff everything? What are they doing?"
            question_type: reason
            expected_answers: ["smelling", "finding things", "exploring", "curious"]
            correct_feedback: "Amazing! Dogs can smell 10,000 times better than us! They smell things we can't even imagine!"
            hint: "When you want to know if food is good, you smell it. Dogs do this too, but much better!"
      - round: 3
        topic_options:
          - topic_id: animal_senses
            attribute: hearing
            is_default: true
            question: "Look at the dog's ears. Why do you think they can move?"
            question_type: reason
            expected_answers: ["hear better", "listen", "sounds", "catch sounds"]
            correct_feedback: "Exactly! Dogs move their ears to catch sounds better. They can hear sounds we can't hear!"
            hint: "When you want to hear better, you might put your hand behind your ear. Dogs use their ears the same way!"
      - round: 4
        topic_options:
          - topic_id: animal_senses
            attribute: comparison
            is_default: true
            question: "Which sense do you think is the strongest for dogs - smell, hearing, or seeing?"
            question_type: choice
            expected_answers: ["smell", "smelling", "nose"]
            correct_feedback: "You got it! Smell is a dog's superpower! That's why police dogs can find lost people!"
            hint: "Think about what we talked about. What can dogs do 10,000 times better?"
    activity_suggestions:
      - type: comparison_game
        name: "Animal Senses Challenge"
        topic_match: 1.0
      - type: story
        name: "The Dog Detective"
        topic_match: 0.9

  # ---------------------------------------------------------
  # DOG - Tier 3: Behavior
  # ---------------------------------------------------------
  - id: pathway_dog_behavior_tier3
    object_id: animal_dog
    object_name: Dog
    age_tier: 3
    default_rounds: 4
    max_rounds: 6
    topic_config:
      primary_topic: animal_behavior
      secondary_topics: ["animal_communication", "animal_senses"]
      topic_switch_allowed: true
    initial_response_template: "A dog! Dogs have fascinating ways of communicating. Let's decode their body language!"
    steps:
      - round: 1
        topic_options:
          - topic_id: animal_communication
            attribute: tail
            is_default: true
            question: "Dogs use their tails to communicate. A wagging tail means happy, but what might a tucked tail between the legs mean?"
            question_type: reason
            expected_answers: ["scared", "afraid", "nervous", "worried", "unhappy"]
            correct_feedback: "Right! A tucked tail often means the dog is scared or nervous. Dogs speak with their whole body!"
            hint: "If a wagging tail is happy, what would be the opposite feeling?"
      - round: 2
        topic_options:
          - topic_id: animal_communication
            attribute: ears
            is_default: true
            question: "When a dog's ears are forward, it's alert and curious. What do you think it means when ears are flat against the head?"
            question_type: reason
            expected_answers: ["scared", "submissive", "nervous", "worried"]
            correct_feedback: "Good thinking! Flat ears often mean the dog is scared or being submissive. Alert ears forward means 'What's that?'"
            hint: "Think about how you feel when you try to make yourself smaller."
      - round: 3
        topic_options:
          - topic_id: animal_behavior
            attribute: pack
            is_default: true
            question: "Dogs descended from wolves who live in packs. Why do you think dogs like being around people so much?"
            question_type: reason
            expected_answers: ["family", "pack", "need company", "social", "don't like being alone"]
            correct_feedback: "Dogs see their human family as their pack! They're social animals who feel happiest with their 'pack' around them."
            hint: "Wolves live together in groups called packs. Dogs think of their family as..."
      - round: 4
        topic_options:
          - topic_id: animal_behavior
            attribute: training
            is_default: true
            question: "Dogs can learn tricks like sit, stay, and fetch. Why do you think they're so good at learning from humans?"
            question_type: reason
            expected_answers: ["want to please", "smart", "food reward", "bond with humans", "working together"]
            correct_feedback: "Dogs and humans have lived together for over 15,000 years! Dogs evolved to understand and work with us. They want to please their pack!"
            hint: "Dogs have been our companions for thousands of years. They've learned to understand us."
    activity_suggestions:
      - type: observation
        name: "Dog Body Language Guide"
        topic_match: 1.0
      - type: role_play
        name: "Communicate Like a Dog"
        topic_match: 0.9

  # ---------------------------------------------------------
  # BUTTERFLY - Tier 2: Composite
  # ---------------------------------------------------------
  - id: pathway_butterfly_composite_tier2
    object_id: animal_butterfly
    object_name: Butterfly
    age_tier: 2
    default_rounds: 4
    max_rounds: 5
    topic_config:
      primary_topic: animal_appearance
      secondary_topics: ["animal_lifecycle", "pollination"]
      topic_switch_allowed: true
      max_switches_per_session: 2
    initial_response_template: "Wow! You found a butterfly! Its wings are so beautiful!"
    steps:
      - round: 1
        topic_options:
          - topic_id: animal_appearance
            attribute: color
            is_default: true
            question: "What colors can you see on the butterfly's wings? What do they look like?"
            question_type: descriptive
            expected_answers: ["colorful", "orange", "pretty", "like a flower", "beautiful"]
            correct_feedback: "Beautiful description! You know what's amazing? Every butterfly's wing pattern is unique!"
            hint: "Look carefully at the wings. What colors do you see?"
      - round: 2
        topic_options:
          - topic_id: pollination
            attribute: behavior
            is_default: true
            question: "The butterfly keeps flying around the flowers. Why do you think it does that?"
            question_type: reason
            expected_answers: ["eating", "drinking nectar", "collecting nectar", "likes flowers"]
            correct_feedback: "You're so smart! Butterflies love to drink the sweet nectar inside flowers. They use their long tongue like a straw!"
            hint: "There's something sweet inside flowers that butterflies love. What could it be?"
          - topic_id: animal_appearance
            attribute: pattern
            is_default: false
            trigger_keywords: ["pattern", "spots", "design", "pretty"]
            question: "What do the patterns on the wings look like? Why do you think butterflies have such pretty patterns?"
            question_type: creative
            expected_answers: ["like flowers", "like eyes", "very pretty", "scare enemies"]
            correct_feedback: "Great imagination! Some butterfly patterns even look like eyes to scare away birds!"
            hint: "Look closely. Do the patterns remind you of anything?"
      - round: 3
        topic_options:
          - topic_id: pollination
            attribute: helping
            is_default: true
            question: "When the butterfly drinks nectar, it helps the flowers do something important. Do you know what?"
            question_type: reason
            expected_answers: ["pollinate", "help flowers", "carry pollen", "make seeds"]
            correct_feedback: "Amazing! Butterflies help carry pollen from flower to flower, which helps flowers make seeds for new flowers!"
            hint: "Butterflies get pollen on their body and carry it to other flowers..."
          - topic_id: animal_lifecycle
            attribute: metamorphosis
            is_default: false
            trigger_keywords: ["when young", "before", "how it came", "caterpillar", "change"]
            question: "Do you know what a butterfly looked like when it was little? Did it always have wings?"
            question_type: reason
            expected_answers: ["caterpillar", "worm", "no wings", "not a butterfly"]
            correct_feedback: "Wow, you know! When butterflies are little, they're caterpillars with no wings. Then they make a cocoon and transform into beautiful butterflies!"
            hint: "Baby butterflies look very different. They crawl on leaves. What are they called?"
      - round: 4
        topic_options:
          - topic_id: animal_lifecycle
            attribute: analogy
            is_default: true
            question: "A caterpillar becoming a butterfly is like magic! What other animals change like that?"
            question_type: open
            expected_answers: ["frog", "dragonfly", "tadpole", "amazing", "cool"]
            correct_feedback: "You thought of frogs! Great job! Tadpoles become frogs, caterpillars become butterflies - nature is so magical!"
            hint: "Think about it - do little tadpoles look like frogs?"
    activity_suggestions:
      - type: story
        name: "Caterpillar Becomes Butterfly"
        topic_match: 1.0
      - type: flashcard
        name: "Butterfly Wing Matching"
        topic_match: 0.9

  # ---------------------------------------------------------
  # FISH - Tier 1: Appearance
  # ---------------------------------------------------------
  - id: pathway_fish_appearance_tier1
    object_id: animal_fish
    object_name: Fish
    age_tier: 1
    default_rounds: 4
    max_rounds: 5
    topic_config:
      primary_topic: animal_appearance
      secondary_topics: ["animal_habitat", "animal_movement"]
      topic_switch_allowed: true
    initial_response_template: "Splash! You spotted a fish! Look at it swim!"
    steps:
      - round: 1
        topic_options:
          - topic_id: animal_appearance
            attribute: color
            is_default: true
            question: "What colors can you see on the fish? Is it one color or many colors?"
            question_type: descriptive
            expected_answers: ["gold", "orange", "silver", "colorful", "red", "blue"]
            correct_feedback: "Beautiful! Fish come in so many pretty colors - like swimming rainbows!"
            hint: "Look carefully at the fish's body. What colors do you see?"
      - round: 2
        topic_options:
          - topic_id: animal_appearance
            attribute: shape
            is_default: true
            question: "What shape is the fish's body? Is it round like a ball or long like a banana?"
            question_type: choice
            expected_answers: ["long", "oval", "flat", "round", "slim"]
            correct_feedback: "Good eyes! Fish have smooth, sleek bodies to help them zoom through water!"
            hint: "Imagine drawing the fish. Would you draw a circle or an oval?"
      - round: 3
        topic_options:
          - topic_id: animal_appearance
            attribute: fins
            is_default: true
            question: "Can you find the fish's fins? How many can you count?"
            question_type: counting
            expected_answers: ["1", "2", "3", "4", "5", "many", "lots"]
            correct_feedback: "Great counting! Fins are like the fish's arms and legs for swimming!"
            hint: "Look for the parts that stick out from the fish's body and move."
      - round: 4
        topic_options:
          - topic_id: animal_habitat
            attribute: water
            is_default: true
            question: "Where does the fish live? Can it live outside of water?"
            question_type: reason
            expected_answers: ["water", "no", "needs water", "pond", "ocean", "river"]
            correct_feedback: "That's right! Fish must live in water. They can't breathe air like we do!"
            hint: "Think about where you always see fish. What do they need?"
    activity_suggestions:
      - type: coloring
        name: "Design Your Own Fish"
        topic_match: 1.0
      - type: movement_game
        name: "Swim Like a Fish"
        topic_match: 0.9

  # ---------------------------------------------------------
  # FISH - Tier 2: Habitat
  # ---------------------------------------------------------
  - id: pathway_fish_habitat_tier2
    object_id: animal_fish
    object_name: Fish
    age_tier: 2
    default_rounds: 4
    max_rounds: 5
    topic_config:
      primary_topic: animal_habitat
      secondary_topics: ["animal_breathing", "animal_appearance"]
      topic_switch_allowed: true
    initial_response_template: "A fish! Let's dive in and learn about where fish live!"
    steps:
      - round: 1
        topic_options:
          - topic_id: animal_habitat
            attribute: water_type
            is_default: true
            question: "Fish live in water, but do you know there are different types of water? What kind do you think this fish likes?"
            question_type: choice
            expected_answers: ["freshwater", "ocean", "river", "lake", "pond", "sea", "saltwater"]
            correct_feedback: "Good thinking! Some fish live in rivers and lakes (freshwater), and some live in the ocean (saltwater)!"
            hint: "Think about the ocean versus a lake. They're both water, but they're different!"
      - round: 2
        topic_options:
          - topic_id: animal_breathing
            attribute: gills
            is_default: true
            question: "We breathe air with our lungs. How do you think fish breathe underwater?"
            question_type: reason
            expected_answers: ["gills", "special", "different", "water"]
            correct_feedback: "Amazing! Fish have gills instead of lungs! Gills take air out of the water. That's their superpower!"
            hint: "Look at the sides of the fish's head. Do you see openings that move?"
      - round: 3
        topic_options:
          - topic_id: animal_habitat
            attribute: survival
            is_default: true
            question: "What would happen if we took a fish out of water? Why?"
            question_type: reason
            expected_answers: ["die", "can't breathe", "needs water", "gills need water", "bad"]
            correct_feedback: "Exactly right. Fish need water to breathe through their gills. Without water, they can't get air!"
            hint: "Remember how fish breathe? Think about what would happen without water."
      - round: 4
        topic_options:
          - topic_id: animal_habitat
            attribute: comparison
            is_default: true
            question: "Fish need water, birds need air to fly. What do humans need to live?"
            question_type: open
            expected_answers: ["air", "food", "water", "land", "houses"]
            correct_feedback: "We need air, water, and food! Every living thing needs its special home. Fish have water, we have land!"
            hint: "Think about what you need every day to stay healthy and alive."
    activity_suggestions:
      - type: comparison_chart
        name: "Fish vs. Land Animals"
        topic_match: 1.0
      - type: virtual_aquarium
        name: "Build Your Fish Tank"
        topic_match: 0.9

  # ---------------------------------------------------------
  # FISH - Tier 3: Breathing
  # ---------------------------------------------------------
  - id: pathway_fish_breathing_tier3
    object_id: animal_fish
    object_name: Fish
    age_tier: 3
    default_rounds: 4
    max_rounds: 6
    topic_config:
      primary_topic: animal_breathing
      secondary_topics: ["animal_habitat", "animal_classification"]
      topic_switch_allowed: true
    initial_response_template: "A fish! These underwater creatures have a fascinating way of breathing. Let's explore!"
    steps:
      - round: 1
        topic_options:
          - topic_id: animal_breathing
            attribute: gills_function
            is_default: true
            question: "Fish have gills instead of lungs. What do you think gills do?"
            question_type: reason
            expected_answers: ["breathe", "get oxygen", "take air from water", "filter water"]
            correct_feedback: "Excellent! Gills pull oxygen out of the water. Water goes in through the mouth and out through the gills!"
            hint: "Think about what lungs do for us. Gills do something similar but in water."
      - round: 2
        topic_options:
          - topic_id: animal_breathing
            attribute: water_flow
            is_default: true
            question: "Water constantly flows over the fish's gills. Why do you think they need constant water flow?"
            question_type: reason
            expected_answers: ["more oxygen", "keep breathing", "fresh water", "need new water"]
            correct_feedback: "Fresh water has oxygen! The fish keeps pushing water through to get new oxygen, just like we keep breathing in new air!"
            hint: "Think about how you need to keep breathing in fresh air, not the same air over and over."
      - round: 3
        topic_options:
          - topic_id: animal_classification
            attribute: cold_blooded
            is_default: true
            question: "Fish are cold-blooded. What do you think that means?"
            question_type: knowledge
            expected_answers: ["body temperature changes", "same as water", "not warm", "depends on surroundings"]
            correct_feedback: "Fish's body temperature matches the water around them! That's different from us - we stay warm no matter what!"
            hint: "Unlike us, fish don't keep their body at the same temperature all the time."
      - round: 4
        topic_options:
          - topic_id: animal_classification
            attribute: comparison
            is_default: true
            question: "Mammals like dolphins also live in water but breathe air with lungs. What's different about how fish and dolphins breathe?"
            question_type: comparison
            expected_answers: ["dolphins breathe air", "fish breathe water", "dolphins have lungs", "dolphins come up for air"]
            correct_feedback: "Dolphins must come to the surface to breathe air! Fish never need to - they get all their oxygen from water."
            hint: "Have you ever seen dolphins coming up out of the water? Why do they do that?"
    activity_suggestions:
      - type: diagram
        name: "How Fish Breathe"
        topic_match: 1.0
      - type: comparison
        name: "Fish vs Dolphin Breathing"
        topic_match: 0.9

  # ---------------------------------------------------------
  # BIRD - Tier 1: Sounds
  # ---------------------------------------------------------
  - id: pathway_bird_sounds_tier1
    object_id: animal_bird
    object_name: Bird
    age_tier: 1
    default_rounds: 4
    max_rounds: 5
    topic_config:
      primary_topic: animal_behavior
      secondary_topics: ["animal_appearance"]
      topic_switch_allowed: true
    initial_response_template: "Look! A bird! Listen to it sing!"
    steps:
      - round: 1
        topic_options:
          - topic_id: animal_behavior
            attribute: sound
            is_default: true
            question: "What sound is the bird making? Can you make that sound too?"
            question_type: imitation
            expected_answers: ["tweet", "chirp", "sing", "whistle"]
            correct_feedback: "Tweet tweet! Great singing! Birds use sounds to talk to each other!"
            hint: "Listen carefully. Does it go tweet-tweet or chirp-chirp?"
      - round: 2
        topic_options:
          - topic_id: animal_appearance
            attribute: color
            is_default: true
            question: "What colors do you see on this bird's feathers?"
            question_type: descriptive
            expected_answers: ["brown", "red", "blue", "yellow", "black", "gray"]
            correct_feedback: "Beautiful feathers! Each kind of bird has different colored feathers!"
            hint: "Look at the bird's body. What pretty colors can you find?"
      - round: 3
        topic_options:
          - topic_id: animal_behavior
            attribute: flying
            is_default: true
            question: "What is this bird doing? Is it flying, hopping, or sitting?"
            question_type: observation
            expected_answers: ["flying", "hopping", "sitting", "eating", "walking"]
            correct_feedback: "Great observation! Birds can fly, hop, walk, and more!"
            hint: "Watch the bird carefully. What is it doing right now?"
      - round: 4
        topic_options:
          - topic_id: animal_appearance
            attribute: beak
            is_default: true
            question: "Can you find the bird's beak? What does it use its beak for?"
            question_type: reason
            expected_answers: ["eating", "picking", "food", "singing"]
            correct_feedback: "Right! Birds use their beaks to eat food and sing songs!"
            hint: "The beak is the pointy part on the bird's face. What could it use it for?"
    activity_suggestions:
      - type: sound_game
        name: "Bird Song Guessing"
        topic_match: 1.0
      - type: nature_walk
        name: "Find Different Birds"
        topic_match: 0.9

  # ---------------------------------------------------------
  # BIRD - Tier 2: Flight
  # ---------------------------------------------------------
  - id: pathway_bird_flight_tier2
    object_id: animal_bird
    object_name: Bird
    age_tier: 2
    default_rounds: 4
    max_rounds: 5
    topic_config:
      primary_topic: flight
      secondary_topics: ["animal_appearance", "animal_adaptation"]
      topic_switch_allowed: true
    initial_response_template: "A bird! These amazing creatures can fly! Let's find out how!"
    steps:
      - round: 1
        topic_options:
          - topic_id: flight
            attribute: wings
            is_default: true
            question: "Birds can fly but we can't. What do birds have that we don't?"
            question_type: reason
            expected_answers: ["wings", "feathers", "light", "hollow bones"]
            correct_feedback: "Right! Birds have wings with feathers! When they flap their wings, they can push against the air and fly!"
            hint: "Think about what moves on a bird's body when it flies."
      - round: 2
        topic_options:
          - topic_id: flight
            attribute: feathers_function
            is_default: true
            question: "Why do you think feathers are important for flying?"
            question_type: reason
            expected_answers: ["catch air", "light", "help fly", "push air"]
            correct_feedback: "Great thinking! Feathers are light but strong. They catch the air like a fan and push the bird up!"
            hint: "Imagine holding a fan. When you wave it, what happens to the air?"
      - round: 3
        topic_options:
          - topic_id: flight
            attribute: light_body
            is_default: true
            question: "Birds need to be light to fly. What makes their body special and light?"
            question_type: reason
            expected_answers: ["hollow bones", "small", "light", "special bones"]
            correct_feedback: "Amazing! Bird bones are hollow - like straws! This makes them super light while still being strong!"
            hint: "Think about what would make something lighter. Is a solid ball or a hollow ball lighter?"
      - round: 4
        topic_options:
          - topic_id: animal_adaptation
            attribute: non_flying_birds
            is_default: true
            question: "Can all birds fly? Can you think of any bird that can't fly?"
            question_type: open
            expected_answers: ["penguin", "ostrich", "chicken", "kiwi", "emu"]
            correct_feedback: "You know a lot! Penguins and ostriches are birds but can't fly! Penguins swim instead, and ostriches run super fast!"
            hint: "Think about birds at the zoo. Are there any really big ones or ones that swim?"
    activity_suggestions:
      - type: experiment
        name: "Paper Airplane Wings"
        topic_match: 1.0
      - type: comparison
        name: "Flying vs Non-Flying Birds"
        topic_match: 0.9

  # ---------------------------------------------------------
  # BIRD - Tier 3: Adaptation
  # ---------------------------------------------------------
  - id: pathway_bird_adaptation_tier3
    object_id: animal_bird
    object_name: Bird
    age_tier: 3
    default_rounds: 4
    max_rounds: 6
    topic_config:
      primary_topic: animal_adaptation
      secondary_topics: ["animal_eating", "animal_habitat"]
      topic_switch_allowed: true
    initial_response_template: "A bird! Let's discover how birds are perfectly designed for their lives!"
    steps:
      - round: 1
        topic_options:
          - topic_id: animal_adaptation
            attribute: beak_shape
            is_default: true
            question: "Look at this bird's beak. What shape is it? Why do you think it has this shape?"
            question_type: reason
            expected_answers: ["for eating", "for food", "to get food", "for bugs", "for seeds"]
            correct_feedback: "Excellent thinking! Each bird's beak is shaped perfectly for what it eats. It's like having the perfect tool!"
