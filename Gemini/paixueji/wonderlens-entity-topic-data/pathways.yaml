        topic_options:
          - topic_id: traffic_safety
            attribute: rules
            is_default: true
            question: "Why do you think we have traffic rules? What would happen without them?"
            question_type: reason
            expected_answers: ["crashes", "chaos", "dangerous", "know what to do", "everyone safe"]
            correct_feedback: "Without rules, cars would crash into each other! Rules tell everyone what to do so we can share the road safely. Rules protect everyone!"
            hint: "Imagine if everyone could drive however they wanted. Would that be safe?"
