            attribute: wheat
            is_default: true
            question: "Bread is made from flour. But where does flour come from? It starts as a plant!"
            question_type: knowledge
            expected_answers: ["wheat", "grain", "seeds", "plants"]
            correct_feedback: "Wheat! Flour comes from wheat seeds. Farmers grow wheat in big fields, and the seeds are turned into flour!"
