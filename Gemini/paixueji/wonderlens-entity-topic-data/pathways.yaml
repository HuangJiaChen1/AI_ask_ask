            question_type: reason
            expected_answers: ["hawks eat meat", "hummingbirds eat nectar", "sharp for tearing", "long for flowers"]
            correct_feedback: "You're a nature expert! Hawks tear meat with sharp beaks. Hummingbirds reach into flowers with long beaks. Perfect matches!"
