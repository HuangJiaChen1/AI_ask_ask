            correct_feedback: "Brilliant! Adaptation means animals develop features that help them survive in their environment. It's nature's way of making everything fit perfectly!"
            hint: "Think about all the bird parts we discussed. Why do they all match what the bird needs?"
    activity_suggestions:
      - type: matching_game
