  # ---------------------------------------------------------
  # BOAT - Tier 2: Floating
  # ---------------------------------------------------------
  - id: pathway_boat_floating_tier2
    object_id: vehicle_boat
    object_name: Boat
    age_tier: 2
    default_rounds: 4
    max_rounds: 5
    topic_config:
      primary_topic: physics
      secondary_topics: ["water_transport", "vehicle_parts"]
      topic_switch_allowed: true
    initial_response_template: "A boat! Boats are made of heavy materials but they float. How is that possible? Let's discover the science!"
    steps:
      - round: 1
        topic_options:
          - topic_id: physics
            attribute: heavy_things
            is_default: true
            question: "If you throw a rock in the water, it sinks. Boats are heavy too, but they float. What's different about a boat?"
            question_type: reason
            expected_answers: ["shape", "hollow", "air inside", "spread out"]
            correct_feedback: "Great thinking! A rock is solid and heavy, but a boat is hollow - it has lots of air inside! The air makes it float!"
            hint: "Think about what's inside a rock vs. what's inside a boat."
      - round: 2
        topic_options:
          - topic_id: physics
            attribute: displacement
            is_default: true
            question: "When you put a boat in water, it pushes water out of the way. If the boat pushes away water equal to its own weight, it floats! What happens if you add too many heavy things to a boat?"
            question_type: prediction
            expected_answers: ["sinks", "goes down", "too heavy", "underwater"]
            correct_feedback: "It could sink! If the boat becomes heavier than the water it pushes away, down it goes! That's why boats have a maximum weight they can carry!"
            hint: "If you keep adding heavy things to a boat, what might eventually happen?"
      - round: 3
        topic_options:
          - topic_id: physics
            attribute: experiment
            is_default: true
            question: "Here's an experiment: Take some clay and make a ball - it sinks. Now flatten that same clay into a bowl shape. What do you think will happen?"
            question_type: prediction
            expected_answers: ["float", "stay up", "like a boat"]
            correct_feedback: "The bowl shape floats! Same amount of clay, but the bowl shape traps air and pushes away more water. That's how boats work!"
            hint: "The boat shape holds air inside it. Does the ball shape hold any air?"
      - round: 4
        topic_options:
          - topic_id: water_transport
            attribute: ship_size
            is_default: true
            question: "The biggest ships in the world weigh millions of pounds but still float! How can something so incredibly heavy float?"
            question_type: reason
            expected_answers: ["push away lots of water", "big empty space", "more air", "displacement"]
            correct_feedback: "They push away HUGE amounts of water! Big ships have massive hollow spaces inside. As long as they displace water equal to their weight, they float!"
            hint: "Think about how much water a huge ship pushes out of the way. That water is pushing back!"
    activity_suggestions:
      - type: experiment
        name: "Sink or Float Challenge"
        topic_match: 1.0
      - type: building
        name: "Build Different Hull Shapes"
        topic_match: 0.9

