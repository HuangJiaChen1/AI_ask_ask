- entity_id: people_roles_firefighter
  entity_name: Firefighter
  entity_name_cn: 消防员
  domain: people_roles
  parent_category: professions
  subcategory: emergency_services
  primary_theme:
    theme_id: how_we_organize
    weight: 0.41
    reasoning: Firefighters are part of organized emergency services with stations, alarms, drills, and teamwork, which children
      notice through sirens, safety talks, and community helpers.
  secondary_themes:
  - theme_id: who_we_are
    weight: 0.4
    reasoning: Children see firefighters as brave helpers who protect others, exploring qualities like courage, caring, and
      making safe choices during scary situations.
    context_trigger: when the child says “they save people,” pretends to be brave with a helmet, or asks what firefighters
      do all day.
  - theme_id: how_we_express
    weight: 0.19
    reasoning: Firefighters use clear signals and instructions—sirens, alarms, and shouted directions—so children explore
      communication that keeps everyone calm and safe.
    context_trigger: when the child imitates a siren, practices “stop, drop, and roll,” or gives pretend safety instructions
      to toys.
  primary_key_concepts:
  - concept_id: connection
    relevance: 1.1
    reasoning: Firefighters connect the fire station, trucks, hoses, and community calls, and children notice how one alarm
      leads to many helpers working together.
  - concept_id: responsibility
    relevance: 1.0
    reasoning: Firefighters are responsible for protecting people and property, and children can observe this through safety
      gear, drills, and careful rescue actions.
  - concept_id: function
    relevance: 0.9
    reasoning: Children explore the function of firefighter tools like hoses, ladders, and helmets, linking each item to a
      job such as spraying water or climbing.
  secondary_key_concepts:
  - concept_id: form
    relevance: 0.6
    reasoning: Kids notice the form of the fire truck and equipment—big wheels, long ladders, heavy jackets—and compare how
      shapes match the work.
  - concept_id: causation
    relevance: 0.3
    reasoning: Children ask what causes fires and how to prevent them, linking matches, cooking, and smoke alarms to real
      outcomes they can understand.
  candidate_related_concepts:
  - concept_id: roles
    discipline: Social Studies
    reasoning: Firefighter is a familiar helper role, with clear actions children can recognize like responding to emergencies
      and teaching safety.
  - concept_id: community
    discipline: Social Studies
    reasoning: Firefighters serve the whole community, and children connect this to shared safety in homes, schools, and neighborhoods.
  - concept_id: collaboration
    discipline: Social Studies
    reasoning: Firefighting requires teamwork—driving, spraying water, rescuing—so children can practice turn-taking and working
      together in pretend play.
  - concept_id: rules
    discipline: Personal, Social and Physical Education
    reasoning: Fire safety rules like exiting calmly and not hiding are concrete actions children can rehearse, making rules
      meaningful and memorable.
  tier_guidance:
    tier_0:
      available_concepts:
      - concept_id: connection
        relevance: 0.85
        topic_anchors:
          visual:
          - attribute: rides in red truck
            value: big red fire truck
          auditory:
          - attribute: comes with siren sound
            value: loud wee-oo sound
          kinesthetic:
          - attribute: sprays water from hose
            value: water shoots out fast
      - concept_id: form
        relevance: 0.75
        topic_anchors:
          visual:
          - attribute: helmet shape
            value: hard hat on head
          - attribute: jacket look
            value: thick coat with stripes
          tactile:
          - attribute: glove feel
            value: big, tough gloves
      primary_topic_focus: connection
    tier_1:
      available_concepts:
      - concept_id: connection
        relevance: 0.93
        topic_anchors:
          kinesthetic:
          - attribute: alarm_to_action
            value: Alarm rings, firefighters hurry out fast.
          spatial:
          - attribute: station_home
            value: Belongs at the fire station, ready to go.
          relational:
          - attribute: team_helpers
            value: Works with partners, police, and medics.
      - concept_id: function
        relevance: 0.86
        topic_anchors:
          structural:
          - attribute: air_tank_use
            value: Air tank helps them breathe in smoke.
          kinesthetic:
          - attribute: ladder_climb_job
            value: Climbs ladders to reach high windows.
          - attribute: rescue_carry
            value: Carries pets and people to safe places.
      - concept_id: form
        relevance: 0.62
        topic_anchors:
          visual:
          - attribute: reflective_stripes
            value: Shiny stripes sparkle when lights hit.
          tactile:
          - attribute: boots_weight
            value: Heavy boots feel clunky and strong.
          structural:
          - attribute: oxygen_mask_part
            value: Face mask straps on tight for safety.
      primary_topic_focus: connection
    tier_2:
      available_concepts:
      - concept_id: connection
        relevance: 0.92
        topic_anchors:
          relational:
          - attribute: dispatcher_connects_calls_to_crews
            value: A dispatcher answers emergency calls and sends the closest crew to help.
          - attribute: works_with_other_helpers
            value: Firefighters often work with police and paramedics so everyone gets the right kind of help.
          spatial:
          - attribute: coverage_area_and_response_routes
            value: Stations have areas they protect, and crews choose the fastest route to reach the emergency.
      - concept_id: responsibility
        relevance: 1.0
        topic_anchors:
          relational:
          - attribute: works_in_roles_on_a_team
            value: A firefighter team shares jobs (driver, hose helper, rescuer) so everyone stays safe and the work gets
              done faster.
          structural:
          - attribute: gear_rules_keep_the_firefighter_safe
            value: Helmets, coats, and masks are worn in the right order because heat and smoke can hurt skin and lungs.
          temporal:
          - attribute: practice_and_drills_prepare_for_real_calls
            value: They practice safety steps again and again so their bodies remember what to do quickly during an emergency.
      - concept_id: function
        relevance: 0.9
        topic_anchors:
          structural:
          - attribute: water_and_foam_stop_fire_differently
            value: Water cools burning things down, and foam can cover some fires to help block air from feeding the flames.
          - attribute: sirens_and_lights_clear_a_path
            value: The loud siren and flashing lights warn others to move aside so the firefighters can reach the emergency
              sooner.
          kinesthetic:
          - attribute: firefighters_search_and_rescue_in_smoke
            value: They crawl low, check rooms, and guide people out because cleaner air is often closer to the floor.
      - concept_id: form
        relevance: 0.58
        topic_anchors:
          structural:
          - attribute: air_pack_harness_fit
            value: The air tank is held by a strong harness so it stays on the firefighter’s back while moving.
          - attribute: helmet_brim_and_face_shield
            value: Helmets can have a brim and shield to help block heat, sparks, and falling bits.
          visual:
          - attribute: high_visibility_number_labels
            value: Big numbers and bright marks help teammates spot each other and know which crew they are.
      - concept_id: causation
        relevance: 0.32
        topic_anchors:
          structural:
          - attribute: oxygen_runs_out_in_smoky_rooms
            value: Fires use up oxygen and make smoke, so breathing can get hard and dangerous.
      primary_topic_focus: connection
    tier_3:
      available_concepts:
      - concept_id: connection
        relevance: 0.88
        topic_anchors:
          relational:
          - attribute: mutual_aid_partnerships
            value: Firefighters may team up with nearby towns during big emergencies so more trucks and helpers can work as
              one system.
          - attribute: prevention_network
            value: Firefighters connect with schools and families through safety lessons, which can reduce emergencies before
              they start.
          evaluative:
          - attribute: public_trust_and_fair_service
            value: Communities depend on firefighters to help everyone, so decisions about where stations are placed can affect
              who gets help fastest.
      - concept_id: responsibility
        relevance: 0.86
        topic_anchors:
          relational:
          - attribute: triage_decisions_prioritize_lives
            value: In big emergencies, firefighters may choose to rescue the most at-risk people first, showing how responsibility
              can mean making hard, time-limited choices for the greatest safety.
          evaluative:
          - attribute: fair_service_to_all_neighborhoods
            value: Communities expect firefighters to help every person equally, so responsibility includes fairness—serving
              all neighborhoods well, not just the easiest or closest ones.
          - attribute: privacy_and_dignity_during_rescues
            value: When helping people who are scared, hurt, or displaced, firefighters try to protect privacy and dignity,
              which is an ethical part of helping.
      - concept_id: function
        relevance: 0.72
        topic_anchors:
          structural:
          - attribute: incident_command_system_organizes_actions
            value: Firefighting uses a leader-and-teams structure (incident command) so many people can work at once without
              confusion, like a living system that keeps information and tasks flowing.
          temporal:
          - attribute: prevention_education_reduces_future_emergencies
            value: Teaching fire safety at schools and checking hazards can prevent later emergencies, so the firefighter’s
              job function includes changing what happens in the future, not only reacting today.
      - concept_id: form
        relevance: 0.52
        topic_anchors:
          structural:
          - attribute: gear_layers_for_multiple_hazards
            value: Firefighter clothing is built in layers so it can block heat, resist tearing, and still let the body move
              and breathe.
          - attribute: tools_are_specialized_by_shape
            value: Many tools have shapes made for specific jobs—like prying, cutting, or breaking—showing how design matches
              a task.
          evaluative:
          - attribute: uniform_as_identity_signal
            value: A firefighter’s uniform acts like a symbol that says “trained helper,” which can calm people and help others
              follow directions.
      - concept_id: causation
        relevance: 0.34
        topic_anchors:
          temporal:
          - attribute: early_warning_changes_outcome
            value: A smoke alarm that warns early can turn a dangerous fire into a smaller problem because people can leave
              sooner and firefighters can arrive earlier.
          relational:
          - attribute: human_choices_affect_risk
            value: Safe choices—like keeping cooking watched and storing matches safely—cause fewer fires, showing how everyday
              habits change community safety.
      primary_topic_focus: connection
