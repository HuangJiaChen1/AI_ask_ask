- entity_id: buildings_places_playground
  entity_name: Playground
  entity_name_cn: 游乐场
  domain: buildings_places
  parent_category: public_spaces
  subcategory: play_areas
  primary_theme:
    theme_id: who_we_are
    weight: 0.4
    reasoning: A playground helps children explore who they are through play, friendships, confidence, and choices as they
      try new equipment and interact with others.
  secondary_themes:
  - theme_id: how_we_organize
    weight: 0.35
    reasoning: Playgrounds have organized spaces and routines, like taking turns on swings and using different zones for climbing,
      sliding, and resting.
    context_trigger: when the child waits for a turn, talks about the line for the slide, or asks “What are the rules here?”
  - theme_id: how_world_works
    weight: 0.25
    reasoning: Children discover how forces and motion work by swinging, sliding, spinning, and balancing, noticing how pushing,
      gravity, and friction change movement.
    context_trigger: when the child experiments by pushing a swing harder, tries different slide positions, or asks “Why do
      I go faster?”
  primary_key_concepts:
  - concept_id: connection
    relevance: 0.9
    reasoning: Children make connections between their actions and others, like playing together, sharing space, and noticing
      how one child’s turn affects everyone waiting.
  - concept_id: perspective
    relevance: 0.9
    reasoning: A playground invites different perspectives because children may feel brave or nervous on the same climber,
      and they learn others may want different games.
  - concept_id: responsibility
    relevance: 0.9
    reasoning: Children practice responsibility by using equipment safely, watching for smaller children, tidying toys, and
      following adult guidance to avoid injuries.
  secondary_key_concepts:
  - concept_id: function
    relevance: 0.8
    reasoning: Each piece of equipment has a function, like slides for going down, ladders for climbing up, and swings for
      back-and-forth motion.
  - concept_id: form
    relevance: 0.7
    reasoning: Children notice forms such as curved slides, round merry-go-rounds, and rope nets, and how shapes and sizes
      change what they can do.
  candidate_related_concepts:
  - concept_id: community
    discipline: Social Studies
    reasoning: A playground is a community place where families meet, children play together, and people share public equipment
      and space.
  - concept_id: identity
    discipline: PSPE
    reasoning: Children build identity by discovering what they enjoy, what they can do, and how they see themselves as a
      friend, leader, or careful risk-taker.
  - concept_id: safety
    discipline: PSPE
    reasoning: Safety is visible through soft ground, handrails, and adult reminders, helping children learn to check spaces,
      hold on, and play thoughtfully.
  - concept_id: rules
    discipline: Social Studies
    reasoning: Rules like taking turns, no pushing, and using equipment the right way help children understand fairness and
      prevent accidents.
  tier_guidance:
    tier_0:
      available_concepts:
      - concept_id: connection
        relevance: 0.85
        topic_anchors:
          visual:
          - attribute: kids close together
            value: friends playing near
          auditory:
          - attribute: play sounds
            value: laughing and shouting
          kinesthetic:
          - attribute: taking turns
            value: wait, then go
      - concept_id: form
        relevance: 0.9
        topic_anchors:
          visual:
          - attribute: slide shape
            value: long curvy slide
          - attribute: swing shape
            value: seat on chains
          tactile:
          - attribute: equipment feel
            value: cold hard metal
      primary_topic_focus: connection
    tier_1:
      available_concepts:
      - concept_id: connection
        relevance: 0.86
        topic_anchors:
          relational:
          - attribute: shared_play_space
            value: Friends use the same space and share safely.
          spatial:
          - attribute: different_play_zones
            value: Climbing area, slide area, and resting bench.
          emotional:
          - attribute: waiting_feelings
            value: Waiting can feel hard; cheering feels kind.
      - concept_id: function
        relevance: 0.82
        topic_anchors:
          kinesthetic:
          - attribute: merry_go_round_spin
            value: Hold tight and spin when someone pushes.
          - attribute: seesaw_bounce
            value: Up and down happens with a friend.
          structural:
          - attribute: handholds_and_bars
            value: Bars give hands a place to grip.
      - concept_id: form
        relevance: 0.7
        topic_anchors:
          visual:
          - attribute: ladder_rungs_pattern
            value: Rungs look like steps, one after another.
          - attribute: platforms_and_tunnels
            value: Flat platforms and round tunnels to crawl through.
          spatial:
          - attribute: tall_vs_short_structures
            value: Some parts are high; some are close to ground.
      primary_topic_focus: connection
    tier_2:
      available_concepts:
      - concept_id: connection
        relevance: 0.9
        topic_anchors:
          relational:
          - attribute: turn-taking lines spread out play fairly
            value: When children wait in a line, everyone gets a chance and fewer arguments happen because the order is clear.
          - attribute: different equipment invites different kinds of teamwork
            value: A seesaw needs two people to balance, a swing often needs someone to push, and a climbing net can turn
              into a ‘helping chain’ with friends.
          spatial:
          - attribute: zones help many groups play at once
            value: Separating quiet corners, climbing areas, and fast-moving areas helps people avoid bumping and lets different
              games happen together.
      - concept_id: perspective
        relevance: 0.9
        topic_anchors:
          emotional:
          - attribute: same_equipment_different_feelings
            value: The tall climber can feel exciting to one child and scary to another because bodies and comfort levels
              are different.
          - attribute: turn_waiting_feels_different
            value: Waiting for a turn can feel fair and calm to some children, but feel frustrating to others when they really
              want to go now.
          relational:
          - attribute: different_play_goals
            value: Some children come to run and chase, while others want quiet pretend play, so they may choose different
              areas and games.
      - concept_id: responsibility
        relevance: 0.9
        topic_anchors:
          kinesthetic:
          - attribute: safe_body_moves_reduce_accidents
            value: Using two hands on rails, feet-first on slides, and sitting properly helps stop slips and bumps.
          - attribute: space_checking_prevents_collisions
            value: Looking before jumping off or running through an area helps avoid crashing into someone using equipment.
          relational:
          - attribute: protecting_smaller_children
            value: Moving carefully near toddlers and giving them extra space helps everyone play without getting hurt.
      - concept_id: function
        relevance: 0.8
        topic_anchors:
          kinesthetic:
          - attribute: swings_change_push_into_back_and_forth
            value: A swing turns a push into a repeating forward-and-back motion that can get bigger with good timing.
          - attribute: slides_use_gravity_to_move_down
            value: On a slide, gravity pulls your body downward, and the smooth surface helps you glide.
          structural:
          - attribute: soft_ground_absorbs_falls
            value: Rubber or wood chips are made to cushion bodies by soaking up some of the force if someone falls.
      - concept_id: form
        relevance: 0.7
        topic_anchors:
          structural:
          - attribute: rails and guards shape safer movement
            value: Handrails, side panels, and high edges are built in so hands can hold on and bodies stay on the path when
              it’s high up.
          - attribute: surface materials change grip and speed
            value: Metal and plastic slides feel smoother so bodies slide faster, while rougher steps and textured platforms
              help shoes grip when climbing.
          spatial:
          - attribute: height changes how careful bodies need to be
            value: Taller towers need more climbing and careful steps because the ground is farther away, so builders add
              more support and barriers.
      primary_topic_focus: connection
    tier_3:
      available_concepts:
      - concept_id: connection
        relevance: 0.85
        topic_anchors:
          relational:
          - attribute: community_gathering_place
            value: A playground connects many families into a small community where people who don’t know each other still
              share equipment and space.
          evaluative:
          - attribute: fairness_norms_shape_access
            value: Ideas about fairness—like letting everyone have a turn or inviting someone to join—change who gets to play
              and how safe the mood feels.
          spatial:
          - attribute: paths_link_zones_and_reduce_conflict
            value: Walkways, entrances, and open areas connect play zones, and good flow helps reduce bumping and arguments
              between moving groups.
      - concept_id: perspective
        relevance: 0.9
        topic_anchors:
          evaluative:
          - attribute: risk_comfort_spectrum
            value: The same high climber can feel like a fun challenge to one child and a scary risk to another, so a fair
              playground includes both brave choices and quieter choices.
          relational:
          - attribute: group_game_inclusion
            value: Some children prefer team games while others prefer solo or parallel play, and noticing these differences
              helps friends invite others in without forcing one “right” way to play.
          temporal:
          - attribute: confidence_changes_with_practice
            value: A child’s viewpoint can change over days or weeks as practice builds strength and balance, showing that
              feelings about an activity are not fixed.
      - concept_id: responsibility
        relevance: 0.9
        topic_anchors:
          evaluative:
          - attribute: fair_turn_taking_ethic
            value: Following turn-taking norms is a responsibility because it protects fairness and reduces conflict, especially
              when popular equipment creates long waits.
          kinesthetic:
          - attribute: using_equipment_as_designed
            value: Choosing actions that match the equipment’s design—like sitting on swings and sliding feet-first—shows
              responsible decision-making about risk and safety.
          relational:
          - attribute: conflict_repair_skills
            value: Responsibility includes repairing harm after mistakes, such as apologizing after bumping someone and checking
              if they are okay, which strengthens the playground community.
      - concept_id: function
        relevance: 0.8
        topic_anchors:
          structural:
          - attribute: ground_surface_role_in_system
            value: The ground surface functions as part of the playground system by reducing injury risk and changing how
              bodies move, like adding friction for running or cushioning for jumps.
          kinesthetic:
          - attribute: equipment_as_force_labs
            value: Play equipment functions like a hands-on science lab where children can test pushes, pulls, balance, and
              gravity by changing how hard they pump, lean, or land.
          relational:
          - attribute: zones_support_multiple_needs
            value: Different areas function to serve different needs—active climbing, fast sliding, quiet resting—so many
              kinds of play can happen at the same time without constant collisions.
      - concept_id: form
        relevance: 0.65
        topic_anchors:
          structural:
          - attribute: materials_chosen_for_weather_and_wear
            value: Playground equipment is often made from metal, plastic, and treated wood because these materials handle
              rain, sun, and many hands over time.
          spatial:
          - attribute: layout_creates_challenge_levels
            value: The way structures are spaced and arranged can create easier and harder routes, letting children choose
              risk levels like a self-made obstacle course.
          evaluative:
          - attribute: design_includes_accessibility_choices
            value: Ramps, transfer platforms, and wider paths show how design can include more bodies and abilities, and kids
              can notice who can join which parts.
      primary_topic_focus: connection
