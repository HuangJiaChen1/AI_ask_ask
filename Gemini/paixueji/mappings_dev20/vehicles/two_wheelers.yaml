- entity_id: vehicles_bicycle
  entity_name: Bicycle
  entity_name_cn: 自行车
  domain: vehicles
  parent_category: road vehicles
  subcategory: two-wheelers
  primary_theme:
    theme_id: how_we_organize
    weight: 0.48
    reasoning: A bicycle fits how we organize because families use it for commuting and play with shared road rules, paths,
      and routines like wearing helmets and parking bikes.
  secondary_themes:
  - theme_id: where_place_time
    weight: 0.26
    reasoning: Children relate bikes to familiar places like parks, sidewalks, and bike lanes, and can talk about routes from
      home to school at different times of day.
    context_trigger: when the child says, "Let’s ride to the park," traces a route with their finger, or talks about riding
      in the morning or after school
  - theme_id: how_world_works
    weight: 0.26
    reasoning: 'Kids can explore motion: pedaling turns the chain, wheels spin, brakes slow down, and balance keeps the rider
      upright, matching their curiosity about movement.'
    context_trigger: when the child asks, "Why do the wheels spin?" or experiments with pedaling, braking, or balancing a
      toy bike
  primary_key_concepts:
  - concept_id: function
    relevance: 1.1
    reasoning: Its function is to help a person travel using their own leg power, moving from place to place for fun, exercise,
      or getting somewhere nearby.
  - concept_id: connection
    relevance: 0.9
    reasoning: A bicycle connects the rider to the neighborhood, linking home, school, and parks, and it connects body movement
      to the bike’s moving parts.
  - concept_id: responsibility
    relevance: 0.9
    reasoning: Children can practice responsibility by wearing a helmet, watching for cars, using bells or hand signals, and
      taking care of the bike by parking it properly.
  secondary_key_concepts:
  - concept_id: form
    relevance: 0.7
    reasoning: Two wheels, handlebars, pedals, and a seat are arranged to help a rider steer, push, and balance, showing how
      parts are made for riding.
  - concept_id: causation
    relevance: 0.3
    reasoning: When you pedal faster the bike goes faster, and when you squeeze the brakes it slows, helping children link
      actions with clear outcomes.
  candidate_related_concepts:
  - concept_id: rules
    discipline: Social Studies
    reasoning: Biking involves rules like stopping at crossings and riding on the correct side, which children can rehearse
      with a simple pretend road track.
  - concept_id: community
    discipline: Social Studies
    reasoning: Bikes are part of community life, and children can notice how people share paths, greet neighbors, and travel
      together on family rides.
  - concept_id: collaboration
    discipline: Social Studies
    reasoning: Children can collaborate by riding in a group, taking turns leading, or helping a friend learn, showing how
      shared movement needs cooperation.
  - concept_id: change_over_time
    discipline: Social Studies
    reasoning: Kids can compare learning stages—from balance bike to pedal bike—and notice how their ability changes over
      time with practice and growth.
  tier_guidance:
    tier_0:
      available_concepts:
      - concept_id: connection
        relevance: 0.7
        topic_anchors:
          kinesthetic:
          - attribute: feet push the pedals
            value: push-push with feet
          - attribute: hands hold the bars
            value: hands steer left-right
          auditory:
          - attribute: bell sound
            value: ding-ding bell
      - concept_id: form
        relevance: 0.85
        topic_anchors:
          visual:
          - attribute: wheel count
            value: two big round wheels
          - attribute: handlebar shape
            value: long bar to hold
          tactile:
          - attribute: seat feel
            value: smooth, padded seat
      primary_topic_focus: connection
    tier_1:
      available_concepts:
      - concept_id: function
        relevance: 0.92
        topic_anchors:
          kinesthetic:
          - attribute: brakes_slow
            value: Squeeze brakes to slow down and stop.
          - attribute: steer_turn
            value: Turn handlebars to go left or right.
          relational:
          - attribute: helmet_safety
            value: Helmet helps keep your head safe.
      - concept_id: connection
        relevance: 0.78
        topic_anchors:
          spatial:
          - attribute: rides_on_paths
            value: Belongs on sidewalks, paths, and bike lanes.
          relational:
          - attribute: bike_to_family
            value: Shared with family for rides and errands.
          emotional:
          - attribute: proud_rider
            value: Riding can feel brave and proud.
      - concept_id: form
        relevance: 0.66
        topic_anchors:
          structural:
          - attribute: chain_and_gears
            value: Chain wraps around gears like a loop.
          - attribute: spokes
            value: Thin spokes make a wheel look like a star.
          tactile:
          - attribute: tire_rubber
            value: Rubbery tires feel bouncy when pressed.
      primary_topic_focus: function
    tier_2:
      available_concepts:
      - concept_id: function
        relevance: 1.0
        topic_anchors:
          structural:
          - attribute: pedaling_turns_chain_to_spin_wheel
            value: When you push the pedals, the chain pulls the back wheel around, which moves the bike forward.
          - attribute: tires_grip_the_ground
            value: Rubber tires grip the ground so the bike can move without slipping, even when turning.
          kinesthetic:
          - attribute: shifting_changes_how_hard_pedaling_feels
            value: Gears can make pedaling easier for hills or faster on flat ground by changing how the wheel turns.
      - concept_id: connection
        relevance: 0.84
        topic_anchors:
          relational:
          - attribute: shares_space_with_pedestrians_and_cars
            value: Bikes use shared spaces, so riders connect to rules like yielding and watching for others.
          - attribute: maintenance_connects_to_safety
            value: Air in tires and working brakes connect to safer riding and fewer falls.
          spatial:
          - attribute: parks_and_paths_are_bike_places
            value: Bike lanes, paths, and quiet streets are places chosen to help riders stay safer.
      - concept_id: responsibility
        relevance: 0.9
        topic_anchors:
          relational:
          - attribute: sharing_paths_needs_space_and_slowing
            value: Riders help others by passing carefully, slowing near people walking, and giving a little space.
          - attribute: checking_bike_keeps_rides_safer
            value: Looking at tires, brakes, and the chain before riding helps prevent falls and surprises.
          temporal:
          - attribute: practice_builds_skills_over_time
            value: Riding improves with practice because the body learns balance, steering, and braking little by little.
      - concept_id: form
        relevance: 0.66
        topic_anchors:
          structural:
          - attribute: frame_triangle_strength
            value: Many bike frames use triangle shapes because triangles help hold weight without bending much.
          - attribute: brake_levers_connected_by_cables
            value: Squeezing the lever pulls a cable that makes the brake pads press the wheel.
          visual:
          - attribute: reflectors_for_visibility
            value: Reflectors are bright when light hits them, helping others notice the bike.
      - concept_id: causation
        relevance: 0.38
        topic_anchors:
          temporal:
          - attribute: balance_is_easier_with_motion
            value: When the wheels are rolling, balancing can feel easier than when the bike is stopped.
      primary_topic_focus: function
    tier_3:
      available_concepts:
      - concept_id: function
        relevance: 0.81
        topic_anchors:
          relational:
          - attribute: efficient_short_trip_transport_choice
            value: A bicycle functions well for nearby travel because it can be fast in short distances and fits into community
              systems like bike lanes, racks, and paths.
          temporal:
          - attribute: builds_endurance_over_repeated_rides
            value: Using a bike regularly can help the body’s stamina grow over time, linking the bike’s function to health
              and long-term fitness habits.
          evaluative:
          - attribute: lower_pollution_transport_option
            value: Because it uses human power instead of fuel, a bike’s function connects to environmental choices, helping
              children compare how different travel methods affect air and noise.
      - concept_id: connection
        relevance: 0.76
        topic_anchors:
          relational:
          - attribute: human_power_to_machine_motion
            value: A bicycle connects a rider’s leg muscles to wheel movement through a chain-and-gear system, turning body
              energy into travel.
          - attribute: transport_choice_affects_environment
            value: Choosing a bike for short trips can connect personal travel to cleaner air and less traffic in a neighborhood.
          evaluative:
          - attribute: sharing_space_requires_courtesy
            value: Riding connects you with other road and path users, so clear signals and patience help everyone stay safe
              and respected.
      - concept_id: responsibility
        relevance: 0.79
        topic_anchors:
          relational:
          - attribute: predictable_signaling_supports_shared_space
            value: Using hand signals and looking before turning is responsible because it gives others information they need,
              like sharing your plan so the whole path stays safe.
          evaluative:
          - attribute: speed_choices_match_place_and_people
            value: Riding responsibly includes choosing a speed that fits the place—slower near pedestrians and driveways—so
              safety is based on context, not just skill.
          temporal:
          - attribute: routine_checks_prevent_future_accidents
            value: Checking tires, brakes, and reflectors before riding is responsible because it prevents problems later,
              showing cause-and-effect across time.
      - concept_id: form
        relevance: 0.5
        topic_anchors:
          structural:
          - attribute: gears_change_mechanical_advantage
            value: Different gear sizes change how hard pedaling feels, showing how a small design change can make climbing
              or speeding easier.
          - attribute: frame_geometry_affects_stability
            value: The angles and lengths of the frame help the bike balance and steer, linking shape choices to control.
          evaluative:
          - attribute: design_varies_by_use
            value: Road, mountain, and city bikes look different because designers choose forms that fit different places
              and purposes.
      - concept_id: causation
        relevance: 0.33
        topic_anchors:
          temporal:
          - attribute: practice_changes_skill_over_time
            value: Repeated practice causes the brain and body to coordinate better, so balancing and braking improve over
              weeks.
      primary_topic_focus: function
