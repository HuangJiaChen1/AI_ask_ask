- entity_id: imagination_tyrannosaurus_rex
  entity_name: Tyrannosaurus Rex
  entity_name_cn: 霸王龙
  domain: imagination
  parent_category: dinosaurs
  subcategory: theropods
  primary_theme:
    theme_id: how_we_express
    weight: 0.35
    reasoning: Children use a T. rex to act out loud roars, big movements, and exciting chase stories, expressing emotions
      like bravery and fear through dramatic pretend play and drawings.
  secondary_themes:
  - theme_id: how_world_works
    weight: 0.3
    reasoning: T. rex invites questions about sharp teeth, strong legs, and how predators find food, letting children explore
      simple ideas about bodies, eating, and animal behavior.
    context_trigger: when the child points at the teeth and asks, "Why are they so sharp?" or pretends the dinosaur is hunting
  - theme_id: where_place_time
    weight: 0.26
    reasoning: Kids often ask if T. rex lived 'a long time ago' and imagine jungles or volcanoes, linking the dinosaur to
      prehistoric time and different places on Earth.
    context_trigger: when the child says, "Was it alive when grandpa was little?" or asks where it lived while looking at
      a background scene
  - theme_id: how_we_organize
    weight: 0.09
    reasoning: Children organize play by assigning roles like hunter, explorer, or zookeeper, and they make rules for safety
      and turn-taking during dinosaur games with a T. rex as the main character.
    context_trigger: when the child sets rules like "Don’t go in the dinosaur zone" or assigns roles like "You be the ranger"
  primary_key_concepts:
  - concept_id: form
    relevance: 1.0
    reasoning: The T. rex has a recognizable shape with a big head, tiny arms, and strong tail, so children focus on describing
      and noticing these clear features.
  - concept_id: connection
    relevance: 1.0
    reasoning: Kids connect the T. rex to other dinosaurs, to stories about danger or rescue, and to ideas about teeth and
      eating, linking what they see to what the dinosaur does.
  - concept_id: perspective
    relevance: 0.9
    reasoning: Children imagine different viewpoints, like being the T. rex chasing or being a small animal hiding, and they
      decide whether the dinosaur is a villain or just hungry.
  secondary_key_concepts:
  - concept_id: function
    relevance: 0.6
    reasoning: function for Tyrannosaurus Rex
  - concept_id: causation
    relevance: 0.3
    reasoning: causation for Tyrannosaurus Rex
  candidate_related_concepts:
  - concept_id: creativity
    discipline: Arts
    reasoning: Children invent new scenes for the T. rex, such as superhero dinosaurs or silly dances, using imagination to
      change a scary creature into many story possibilities.
  - concept_id: expression
    discipline: Arts
    reasoning: Roaring, stomping, and posing like a T. rex lets children express energy and emotion, especially excitement
      and confidence, through safe body play.
  - concept_id: symbolism
    discipline: Language
    reasoning: The T. rex often symbolizes being powerful or 'the boss,' and children use it to represent strength in stories
      where the biggest character leads or scares others.
  - concept_id: technology
    discipline: Design
    reasoning: As a designed image or toy, the T. rex encourages noticing features like moving jaws or textures, and children
      compare different models to see how design changes realism.
