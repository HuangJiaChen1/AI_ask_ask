        topic_anchors:
          visual:
          - attribute: big_head
            value: huge head
          - attribute: tiny_arms
            value: very small arms
          - attribute: long_tail
            value: long strong tail
      primary_topic_focus: connection
    tier_1:
      available_concepts:
      - concept_id: connection
        relevance: 0.96
        topic_anchors:
