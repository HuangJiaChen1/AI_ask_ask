            value: One kind of dinosaur in big dino groups.
          - attribute: story_roles
            value: Can be hero, monster, or silly friend.
          emotional:
          - attribute: scary_and_fun
            value: Pretend fear turns into giggles.
      - concept_id: form
        relevance: 0.98
        topic_anchors:
          visual:
          - attribute: sharp_teeth
            value: Pointy teeth line a wide open mouth.
          - attribute: two_strong_legs
            value: Big back legs look like powerful pillars.
          structural:
          - attribute: clawed_feet
            value: Toes have claws for gripping ground.
      - concept_id: function
        relevance: 0.62
        topic_anchors:
          kinesthetic:
          - attribute: stomp_walk
            value: Stomps in pretend play, making floor thuds.
          - attribute: sniff_and_search
            value: Uses nose to find food in stories.
          auditory:
          - attribute: loud_call
            value: Makes big, booming sounds in pretend scenes.
      primary_topic_focus: connection
    tier_2:
      available_concepts:
      - concept_id: connection
        relevance: 0.95
        topic_anchors:
          relational:
          - attribute: predator_and_prey_link
            value: In dinosaur stories, a T. rex connects to other animals because predators look for prey, and prey try to
              escape.
          - attribute: museum_and_fossil_link
            value: People connect T. rex to fossils because bones in rocks help scientists guess what it was like long ago.
          spatial:
          - attribute: lived_in_past_places
            value: T. rex is connected to ancient Earth places where it lived, which were different from many places today.
      - concept_id: form
        relevance: 0.92
        topic_anchors:
          structural:
          - attribute: balancing_tail_role
            value: Its long tail acts like a counter-balance so the big head and heavy body can stay steady while moving.
          - attribute: neck_muscles_support_head
            value: A thick neck helps hold up a heavy skull, which is useful when grabbing and pulling food.
          visual:
          - attribute: bumpy_skin_imagery
            value: Many pictures show bumpy or scaly skin, which helps kids imagine it as tough and protected outdoors.
      - concept_id: perspective
        relevance: 0.9
        topic_anchors:
          emotional:
          - attribute: story_role_changes_feelings
            value: In pretend stories, a T. rex can feel scary as a ‘chaser’ but also exciting or funny as a ‘protector’ or
              ‘lost animal.’
          spatial:
          - attribute: size_difference_changes_viewpoint
            value: Imagining being a tiny animal makes everything feel huge and risky, while imagining being the T. rex makes
              the world feel wide and powerful.
          relational:
          - attribute: hungry_not_mean_in_some_stories
            value: A T. rex might be seen as ‘bad’ by prey, but from the predator’s view it is trying to find food to live.
      - concept_id: function
        relevance: 0.6
        topic_anchors:
          structural:
          - attribute: teeth_and_jaws_for_tearing
            value: Big jaws and many teeth are tools for tearing food, which helps a predator eat quickly.
          kinesthetic:
          - attribute: tail_helps_balance_while_moving
            value: A long tail works like a counter-balance so the body can turn and run without tipping over.
          relational:
          - attribute: pretend_play_builds_self_control
            value: Acting like a T. rex gives a safe way to practice strong feelings, using ‘roar rules’ to stop, take turns,
              and keep friends safe.
      - concept_id: causation
        relevance: 0.4
        topic_anchors:
          structural:
          - attribute: sharp_teeth_cut_meat
            value: Sharp, pointed teeth are shaped to tear and slice, which fits a meat-eater’s diet.
          - attribute: strong_legs_make_fast_steps
            value: Powerful leg muscles help it take big, quick steps, which can help during chasing or surprise attacks.
          relational:
          - attribute: hunting_happens_when_hungry
            value: In nature stories, it hunts because it needs energy from food, so hunger leads to searching and chasing.
      primary_topic_focus: connection
    tier_3:
      available_concepts:
      - concept_id: connection
        relevance: 0.9
        topic_anchors:
          relational:
          - attribute: fossils_connect_to_scientist_jobs
            value: T. rex connects to the work of paleontologists, showing how people use clues from rocks and bones to build
              ideas about long-ago life.
          - attribute: predator_role_connects_to_food_webs
            value: Thinking of T. rex as a top predator connects pretend play to real ecosystems where animals depend on other
              living things for energy.
          evaluative:
          - attribute: power_symbol_changes_story_meaning
            value: When T. rex is used as a ‘boss’ character, it connects to choices about leadership—protecting others versus
              bullying—depending on how the story is told.
      - concept_id: form
        relevance: 0.88
        topic_anchors:
          structural:
          - attribute: body_built_for_strength_over_fine_grip
            value: The body plan suggests strong legs and a heavy head mattered more than using hands, helping children compare
              how different animals are built for different jobs.
          spatial:
          - attribute: large_body_changes_how_it_fits_in_spaces
            value: A huge animal would need wide paths and open areas to turn and move, linking size and shape to habitat
              and movement planning.
          visual:
          - attribute: reconstructions_vary_across_models
            value: Different books and toys show different skins, colors, or feathers because scientists and artists use evidence
              plus careful guessing, connecting form to design choices.
      - concept_id: perspective
        relevance: 0.84
        topic_anchors:
          evaluative:
          - attribute: predator_can_be_seen_as_needed_or_nasty
            value: A T. rex can be viewed as “mean” in a story or as an animal doing its job to survive, showing how perspective
              changes moral judgments.
          - attribute: media_versions_shape_beliefs
            value: Movies, books, and toys show T. rex differently, so children can compare how storytelling choices influence
              what people think is “true.”
          relational:
          - attribute: prey_view_makes_safety_rules_matter
            value: Imagining the viewpoint of a smaller animal can lead children to create kinder play rules, like safe zones
              and no grabbing, to protect everyone’s feelings.
      - concept_id: function
        relevance: 0.6
        topic_anchors:
          relational:
          - attribute: role_in_ecosystem_as_top_predator
            value: In prehistoric food webs, T. rex functioned as a top predator, which could affect how many other animals
              lived in an area.
          evaluative:
          - attribute: symbol_of_power_in_culture
            value: T. rex often functions as a symbol for strength or leadership in stories and logos, which can make characters
              seem brave, bossy, or protective.
          kinesthetic:
          - attribute: pretend_trex_play_practices_self_regulation
            value: Acting like a roaring, stomping T. rex can help children practice controlling big feelings and big movements
              so play stays fun and safe.
      - concept_id: causation
        relevance: 0.42
        topic_anchors:
          relational:
          - attribute: fossil_clues_cause_new_explanations
            value: When scientists find new fossils, it can cause them to update what they think T. rex looked like or how
              it lived, linking evidence to changing ideas.
          evaluative:
          - attribute: fear_in_stories_can_cause_safe_rule_making
            value: Because T. rex stories can feel scary, children often create rules for play (safe zones, no real pushing),
              showing how emotions can cause community agreements.
      primary_topic_focus: connection
