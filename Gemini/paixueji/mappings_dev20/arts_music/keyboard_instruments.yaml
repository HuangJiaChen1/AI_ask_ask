- entity_id: arts_music_piano
  entity_name: Piano
  entity_name_cn: 钢琴
  domain: arts_music
  parent_category: music_instruments
  subcategory: keyboard_instruments
  primary_theme:
    theme_id: how_we_express
    weight: 0.58
    reasoning: A piano lets children create music by pressing keys, exploring loud and soft sounds to express moods, stories,
      and feelings through songs.
  secondary_themes:
  - theme_id: who_we_are
    weight: 0.19
    reasoning: Playing piano supports identity as a learner and musician, letting children practice, perform, and share what
      they like and feel in music.
    context_trigger: when the child says “Listen to my song,” chooses favorite notes, or reacts emotionally like “This sounds
      sad/happy.”
  - theme_id: where_place_time
    weight: 0.15
    reasoning: Pianos are found in homes, schools, and concert halls, and children can notice how music performances happen
      in different places and times.
    context_trigger: when discussing concerts, recitals, or “playing on a big stage,” or when the child asks about old pianos
      or famous composers.
  - theme_id: how_we_organize
    weight: 0.08
    reasoning: The keyboard is arranged in repeating patterns, and songs follow sequences and practice routines, helping children
      see organization in music-making.
    context_trigger: when the child points out the black-key pattern, counts notes, follows a simple practice plan, or says
      “First this part, then that part.”
  primary_key_concepts:
  - concept_id: form
    relevance: 1.1
    reasoning: Children can explore the piano’s parts—keys, pedals, lid—and notice the repeating black-and-white key pattern.
  - concept_id: perspective
    relevance: 1.0
    reasoning: Different children interpret the same melody differently, choosing tempo and volume that match how they feel
      and what they imagine.
  - concept_id: connection
    relevance: 0.9
    reasoning: Pressing keys connects physical action to sound, and connects music reading, listening, and coordinating two
      hands together.
  secondary_key_concepts:
  - concept_id: function
    relevance: 0.6
    reasoning: Children can investigate how the piano works by playing single notes, chords, and loud/soft dynamics to see
      what it can do.
  - concept_id: causation
    relevance: 0.3
    reasoning: Hitting a key harder causes a louder sound, and using pedals causes notes to ring longer, showing clear cause-and-effect.
  candidate_related_concepts:
  - concept_id: creativity
    discipline: Arts
    reasoning: The piano invites improvisation, making up tunes, and experimenting with patterns to create new music.
  - concept_id: expression
    discipline: Arts
    reasoning: Children can express feelings through volume, speed, and melody, like soft lullabies or energetic “storm” sounds.
  - concept_id: culture
    discipline: Social Studies
    reasoning: Piano music appears in many cultural settings, from classical concerts to pop songs, helping children connect
      music to community events.
  - concept_id: symbolism
    discipline: Arts
    reasoning: Musical notes and rhythms are symbols that represent sounds, and the piano helps children link these symbols
      to what they hear.
  tier_guidance:
    tier_0:
      available_concepts:
      - concept_id: form
        relevance: 1.0
        topic_anchors:
          visual:
          - attribute: key_colors
            value: black and white keys
          - attribute: key_pattern
            value: black keys in groups
          tactile:
          - attribute: keys_feel
            value: smooth hard keys
      - concept_id: connection
        relevance: 0.85
        topic_anchors:
          kinesthetic:
          - attribute: press_action
            value: push keys with fingers
          auditory:
          - attribute: sound_change
            value: loud or soft sounds
          - attribute: many_notes
            value: high and low notes
      primary_topic_focus: form
    tier_1:
      available_concepts:
      - concept_id: form
        relevance: 0.9
        topic_anchors:
          structural:
          - attribute: pedals
            value: Foot pedals change how long sounds last.
          - attribute: lid_body
            value: Big wooden body with a lid like a mouth.
          visual:
          - attribute: key_rows
            value: Long row of keys stretches left to right.
      - concept_id: connection
        relevance: 0.78
        topic_anchors:
          kinesthetic:
          - attribute: two_hand_play
            value: Two hands can play together like a team.
          auditory:
          - attribute: high_low_match
            value: Right side sounds high; left side sounds low.
          emotional:
          - attribute: music_feelings
            value: Slow notes can feel calm; fast notes feel excited.
      - concept_id: function
        relevance: 0.6
        topic_anchors:
          auditory:
          - attribute: loud_soft
            value: Press gently for soft; press hard for loud.
          kinesthetic:
          - attribute: repeat_and_rhythm
            value: Tap patterns to make rhythms and little songs.
          structural:
          - attribute: string_hammer_action
            value: Keys make hammers tap strings to make sound.
      primary_topic_focus: form
    tier_2:
      available_concepts:
      - concept_id: form
        relevance: 0.95
        topic_anchors:
          structural:
          - attribute: soundboard_makes_notes_bigger
            value: A wide wooden soundboard helps the piano sound louder by spreading the string vibrations through the wood.
          visual:
          - attribute: keys_repeat_in_groups_of_two_and_three_black
            value: The black keys repeat in a pattern of two, then three, helping players find where notes are.
      - concept_id: perspective
        relevance: 0.92
        topic_anchors:
          auditory:
          - attribute: same_song_can_feel_happy_or_scary_by_how_its_played
            value: Playing faster and louder can sound exciting, while slower and softer can sound gentle or sad, even with
              the same notes.
          - attribute: pauses_change_the_story_a_listener_hears
            value: Leaving little silences can make the music feel like questions, surprises, or calm breaths, depending on
              what the listener imagines.
          emotional:
          - attribute: players_choose_sounds_that_match_their_mood
            value: A child might pick low notes when feeling serious or high notes when feeling playful, showing their own
              viewpoint through sound.
      - concept_id: connection
        relevance: 0.9
        topic_anchors:
          relational:
          - attribute: music_is_patterns_of_repeating_parts
            value: Songs often repeat parts like A-A-B-A, so children can hear how music pieces fit together like story parts.
          auditory:
          - attribute: harmony_when_two_notes_played_together
            value: Pressing two keys at once can make a smooth blended sound or a tense sound, connecting note choices to
              feelings in music.
      - concept_id: function
        relevance: 0.66
        topic_anchors:
          structural:
          - attribute: strings_of_different_lengths_make_high_and_low_notes
            value: Shorter strings vibrate faster for higher sounds, and longer strings vibrate slower for lower sounds.
          kinesthetic:
          - attribute: finger_force_controls_volume
            value: Pushing a key gently makes a soft sound, and pushing more strongly makes a louder sound because the inside
              parts move with more power.
          auditory:
          - attribute: chords_happen_when_notes_play_together
            value: Pressing multiple keys at once mixes sounds into a chord, which can feel smooth, bright, tense, or surprising.
      - concept_id: causation
        relevance: 0.35
        topic_anchors:
          kinesthetic:
          - attribute: key_press_makes_hammer_hit_string
            value: When a key goes down, it causes a small hammer inside to tap a string, starting the sound.
          auditory:
          - attribute: release_key_stops_sound_faster
            value: Letting go of a key makes a dampener touch the string, so the note stops sooner.
          structural:
          - attribute: soft_pedal_changes_hammer_contact
            value: Using the soft pedal makes the hammers hit differently, so the sound becomes quieter and gentler.
      primary_topic_focus: form
    tier_3:
      available_concepts:
      - concept_id: form
        relevance: 0.9
        topic_anchors:
          structural:
          - attribute: octave_repeats_as_a_structural_pattern
            value: The keyboard repeats the same note pattern in higher and lower groups (octaves), like a visual number pattern
              that helps predict where sounds live.
          - attribute: strings_vary_in_thickness_and_number
            value: Lower notes use thicker or longer strings, and many notes use more than one string, showing how builders
              change structure to change sound.
          spatial:
          - attribute: grand_vs_upright_body_layout
            value: Grand pianos spread parts horizontally while uprights stack them vertically, connecting instrument design
              to the space people have in homes or schools.
      - concept_id: perspective
        relevance: 0.88
        topic_anchors:
          evaluative:
          - attribute: music_preferences_reflect_culture_and_personal_history
            value: A song can feel “familiar” or “strange” depending on what music you hear at home or in your community,
              so listeners may judge the same piano piece differently.
          - attribute: performance_choices_can_show_respect_for_audience_needs
            value: Choosing volume and tempo can be a kindness decision—playing softer for a baby or someone sensitive to
              loud sounds shows that a performer thinks about how others experience the music.
          temporal:
          - attribute: practice_changes_how_a_player_hears_mistakes_and_success
            value: As you practice, you notice smaller details (rhythm slips, uneven notes), meaning your perspective becomes
              more precise over time even if the song stays the same.
      - concept_id: connection
        relevance: 0.8
        topic_anchors:
          relational:
          - attribute: left_hand_right_hand_roles_connect_to_math_patterns
            value: One hand often plays repeating patterns while the other plays melody, connecting music to math ideas like
              patterns, sequences, and steady beats.
          - attribute: music_reading_connects_symbols_to_actions
            value: Notes on a staff connect a visual code to a movement plan for fingers, showing how symbols can guide real
              actions.
          evaluative:
          - attribute: pianos_in_community_events
            value: Pianos connect to community life—recitals, worship, theater, and celebrations—showing how music can bring
              people together across generations.
      - concept_id: function
        relevance: 0.46
        topic_anchors:
          structural:
          - attribute: soundboard_functions_as_an_amplifier_system
            value: The soundboard spreads vibrations so the note becomes loud enough for a room, showing how one small action
              can be made bigger by a tool’s design.
          relational:
          - attribute: piano_functions_as_a_math_pattern_machine
            value: Repeating key patterns and steady beats help players count and predict, linking music to math ideas like
              patterns, fractions (note lengths), and sequences.
          evaluative:
          - attribute: pianos_function_in_communities_as_shared_storytelling_tools
            value: In schools, homes, and concerts, pianos help groups share emotions and stories together, showing that instruments
              can have a social job, not just a sound-making job.
      - concept_id: causation
        relevance: 0.35
        topic_anchors:
          kinesthetic:
          - attribute: faster_key_strike_changes_attack_quality
            value: A quick, sharp press can cause a more percussive start to the note, while a gentler press causes a softer
              attack, changing the “story” the sound tells.
          - attribute: sustain_pedal_blends_notes_into_harmony
            value: Holding the sustain pedal causes notes to overlap, which can create a smooth wash of sound or a muddy sound,
              depending on how many notes are played.
          auditory:
          - attribute: repeated_notes_create_rhythm_and_expectation
            value: When a note pattern repeats, listeners expect the next beat, so changing the pattern causes surprise, connecting
              cause-and-effect to feelings in music.
      primary_topic_focus: form
