- entity_id: arts_music_crayons
  entity_name: Crayons
  entity_name_cn: 蜡笔
  domain: arts_music
  parent_category: art_supplies
  subcategory: drawing_tools
  primary_theme:
    theme_id: how_we_express
    weight: 0.58
    reasoning: Crayons help young children express themselves quickly with bright colors, making pictures and marks that communicate
      feelings, stories, and experiences.
  secondary_themes:
  - theme_id: who_we_are
    weight: 0.19
    reasoning: Children often pick crayon colors that match their preferences and emotions, using drawings to show what matters
      to them and who they are.
    context_trigger: when the child chooses one color repeatedly and says “This is my favorite” or draws themselves with chosen
      colors.
  - theme_id: where_place_time
    weight: 0.15
    reasoning: Crayon drawings often show familiar places and times, like school, a trip, or seasons, helping children represent
      their world and memories.
    context_trigger: when the child draws a place and says “This is our classroom” or “We went here yesterday” while adding
      details.
  - theme_id: how_we_organize
    weight: 0.08
    reasoning: Crayons encourage organizing by sorting colors, staying inside shapes, and following steps like outline then
      fill, building early planning habits.
    context_trigger: when the child lines crayons up, asks for a specific color, or says “First I do the border, then I color.”
  primary_key_concepts:
  - concept_id: form
    relevance: 1.1
    reasoning: Crayons have a simple form that fits small hands, and children explore how different tip angles and strokes
      create varied lines and shapes.
  - concept_id: perspective
    relevance: 1.0
    reasoning: Children explain their drawings in their own way, showing that one picture can have many meanings depending
      on the artist’s viewpoint.
  - concept_id: connection
    relevance: 0.9
    reasoning: Crayons connect color to ideas—blue for water, yellow for sun—and connect children’s talk to their drawings
      when they narrate what they made.
  secondary_key_concepts:
  - concept_id: function
    relevance: 0.6
    reasoning: Children learn crayons are made to color smoothly on paper, covering areas quickly and creating strong, waxy
      marks that do not erase easily.
  - concept_id: causation
    relevance: 0.3
    reasoning: Kids see that pushing harder makes darker color and rubbing fast warms the wax, causing different textures
      and sometimes crayon flakes.
  candidate_related_concepts:
  - concept_id: creativity
    discipline: arts
    reasoning: Crayons invite imaginative drawing without many rules, helping children invent characters, patterns, and pretend
      scenes during free exploration.
  - concept_id: expression
    discipline: arts
    reasoning: Children use crayons to show emotions through color choices and energetic strokes, making it easy to communicate
      feelings without words.
  - concept_id: culture
    discipline: social_studies
    reasoning: Children may draw cultural foods, celebrations, and community symbols with crayons, connecting everyday experiences
      and traditions to visual art.
  - concept_id: symbolism
    discipline: arts
    reasoning: Crayon marks can become symbols like traffic lights, flags, or simple signs, teaching that colors and shapes
      can represent shared meanings.
  tier_guidance:
    tier_0:
      available_concepts:
      - concept_id: form
        relevance: 1.0
        topic_anchors:
          visual:
          - attribute: colors
            value: many bright colors
          - attribute: shape
            value: short, chunky stick
          tactile:
          - attribute: feel
            value: waxy and smooth
      - concept_id: connection
        relevance: 0.85
        topic_anchors:
          visual:
          - attribute: mark_on_paper
            value: color lines appear
          - attribute: picture_matches_talk
            value: draw what you say
          kinesthetic:
          - attribute: hand_action
            value: scribble back and forth
      primary_topic_focus: form
    tier_1:
      available_concepts:
      - concept_id: form
        relevance: 0.92
        topic_anchors:
          structural:
          - attribute: paper_wrapper
            value: Paper wrapper keeps fingers cleaner from wax.
          visual:
          - attribute: tip_shape
            value: Pointy tip makes thin lines; flat makes wide.
          tactile:
          - attribute: breakable_stick
            value: If you press too hard, it can snap.
      - concept_id: connection
        relevance: 0.8
        topic_anchors:
          emotional:
          - attribute: color_moods
            value: Bright colors can feel happy; dark can feel spooky.
          relational:
          - attribute: share_and_take_turns
            value: Friends share colors and take turns with favorites.
          spatial:
          - attribute: goes_in_a_box
            value: Crayons belong in a box or cup when done.
      - concept_id: function
        relevance: 0.62
        topic_anchors:
          kinesthetic:
          - attribute: coloring_action
            value: Rubbing on paper leaves a waxy color trail.
          - attribute: layering_colors
            value: You can scribble one color on top of another.
          tactile:
          - attribute: waxy_smell
            value: Smells a little like warm wax when used.
      primary_topic_focus: form
    tier_2:
      available_concepts:
      - concept_id: form
        relevance: 0.95
        topic_anchors:
          structural:
          - attribute: wax_pigment_mix_core
            value: A crayon is made from wax mixed with color powder, so it holds its shape but can still rub off on paper.
          visual:
          - attribute: flat_side_vs_pointy_end_marks
            value: Using the flat side makes wide bands of color, and using the tip makes thin lines.
          tactile:
          - attribute: wrapper_grip_and_clean_fingers
            value: The paper wrapper helps little fingers grip and keeps some wax from getting on hands.
      - concept_id: perspective
        relevance: 0.95
        topic_anchors:
          visual:
          - attribute: same_color_can_show_different_feelings
            value: A child might use red to mean love, anger, or a hot day, so the color message depends on the artist’s idea.
          - attribute: simple_marks_can_stand_for_big_ideas
            value: A circle with lines might be a sun, a face, or a flower, because children use their own symbols when they
              draw.
          relational:
          - attribute: viewer_and_artist_can_disagree_about_what_it_is
            value: One person may see a dinosaur and another may see a dragon, because people connect pictures to different
              memories and stories.
      - concept_id: connection
        relevance: 0.9
        topic_anchors:
          relational:
          - attribute: colors_link_to_symbols_and_rules
            value: Crayon colors can match shared symbols, like red for stop signs and green for go, so pictures can communicate
              to others.
          structural:
          - attribute: paper_texture_changes_color_look
            value: Bumpy paper leaves white specks and smooth paper looks more solid, so the paper you choose connects to
              the picture you get.
      - concept_id: function
        relevance: 0.62
        topic_anchors:
          structural:
          - attribute: wax_binds_color_to_paper
            value: The wax helps tiny bits of color stick to paper fibers, leaving a bright mark where the crayon rubs.
          kinesthetic:
          - attribute: side_of_crayon_covers_big_areas_fast
            value: Using the long side makes wide strokes that fill in backgrounds quickly compared with the pointy tip.
          tactile:
          - attribute: wax_makes_marks_harder_to_erase
            value: Crayon lines don’t wipe away easily because the wax clings to the paper instead of turning back into clean
              paper.
      - concept_id: causation
        relevance: 0.35
        topic_anchors:
          kinesthetic:
          - attribute: hard_press_can_snap_crayon
            value: Pushing too hard can break a crayon because the wax stick cannot bend much.
          tactile:
          - attribute: warm_hands_soften_wax
            value: Holding a crayon a long time can warm it, making the wax softer and easier to smear.
          visual:
          - attribute: repeated_strokes_fill_gaps
            value: Going over the same spot again makes the color look darker and smoother because more wax covers the paper.
      primary_topic_focus: form
    tier_3:
      available_concepts:
      - concept_id: form
        relevance: 0.9
        topic_anchors:
          structural:
          - attribute: wax_to_pigment_ratio_changes_opacity
            value: Crayons with different wax-and-color mixes can look more see-through or more solid on paper, connecting
              materials science to art results.
          - attribute: crayon_tip_geometry_controls_line_width
            value: A rounded tip, sharp edge, or flat side creates different line widths, showing how tool shape changes what
              a hand can make.
          visual:
          - attribute: layering_creates_new_colors_and_value
            value: Stacking one color over another can make a third color or a darker value, like mixing ideas in a story
              to make something new.
      - concept_id: perspective
        relevance: 0.86
        topic_anchors:
          evaluative:
          - attribute: color_meanings_change_across_cultures_and_contexts
            value: A color like white or red can mean different things in different cultures (celebration, warning, luck,
              sadness), so the same drawing might send different messages to different viewers.
          - attribute: art_can_show_identity_choices_not_just_realistic_facts
            value: A child might choose unexpected skin, hair, or clothing colors to show who they feel like inside, reminding
              us that pictures can be about identity and imagination, not only “accuracy.”
          temporal:
          - attribute: interpretation_can_change_when_you_revisit_a_picture_later
            value: Looking at the same crayon picture weeks later can feel different because you remember new things, showing
              how our viewpoint changes over time even if the marks stay the same.
      - concept_id: connection
        relevance: 0.8
        topic_anchors:
          relational:
          - attribute: color_choices_connect_to_culture_and_symbols
            value: Colors in drawings can connect to cultural meaning (like holiday colors or flag colors), showing that art
              can carry shared community messages.
          - attribute: drawing_connects_memory_to_planning
            value: When children draw a place they remember, they connect past experiences to a plan for what to include first,
              like making a map of their thinking.
          evaluative:
          - attribute: sharing_materials_links_to_fairness_and_care
            value: Using crayons together connects art time to classroom fairness because caring for shared tools helps everyone
              have choices and reduces waste.
      - concept_id: function
        relevance: 0.45
        topic_anchors:
          structural:
          - attribute: wrapper_functions_as_grip_and_cleanliness_tool
            value: The paper wrapper helps fingers grip and stay cleaner, which is a design choice that supports longer drawing
              without slippery wax on hands.
          kinesthetic:
          - attribute: crayons_enable_fast_storyboarding_and_planning
            value: Because crayons make quick, bold marks, they work well for making a “first draft” plan—like a storyboard
              for a comic—before adding details with other tools.
          evaluative:
          - attribute: crayons_function_as_low-risk_material_for_trying_ideas
            value: Crayons are inexpensive and forgiving compared to some art materials, so they function as a safe way to
              test ideas, make mistakes, and learn without worrying about wasting supplies.
      - concept_id: causation
        relevance: 0.35
        topic_anchors:
          kinesthetic:
          - attribute: tilting_angle_changes_texture
            value: When the crayon is tilted and rubbed, it lays down a wide, softer patch, while a vertical hold makes a
              thinner, more scratchy line.
          - attribute: using_paper_underlayer_creates_rubbings
            value: When paper is placed over a bumpy surface and colored, the bumps cause raised patterns to appear, showing
              how hidden shapes can be revealed.
          tactile:
          - attribute: friction_heats_wax_and_increases_smudge
            value: Rubbing quickly can warm the wax so it spreads more easily and can smudge, connecting energy from movement
              to a material change.
      primary_topic_focus: form
