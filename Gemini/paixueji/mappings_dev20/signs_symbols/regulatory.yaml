- entity_id: signs_symbols_stop_sign
  entity_name: Stop Sign
  entity_name_cn: 停止标志
  domain: signs_symbols
  parent_category: road_signs
  subcategory: regulatory
  primary_theme:
    theme_id: how_we_organize
    weight: 0.43
    reasoning: A Stop sign organizes road safety by giving a clear rule that everyone must pause, take turns, and avoid crashes
      at crossings.
  secondary_themes:
  - theme_id: how_we_express
    weight: 0.38
    reasoning: Its bold color, special shape, and single word express a strong message that young children can recognize quickly.
    context_trigger: when the child shouts “Stop!” while seeing the sign or imitates the octagon shape with their hands
  - theme_id: where_place_time
    weight: 0.19
    reasoning: Children notice Stop signs appear at intersections and near crossings, linking the sign to specific places
      and moments to pause.
    context_trigger: when the child says “There’s a stop sign at this corner” or anticipates stopping as the car approaches
      an intersection
  primary_key_concepts:
  - concept_id: connection
    relevance: 1.0
    reasoning: The child connects the sign with stopping behavior, looking both ways, and letting other cars or people go
      first.
  - concept_id: function
    relevance: 0.9
    reasoning: Its function is to control traffic flow by requiring a full stop so everyone can move safely in turn.
  - concept_id: responsibility
    relevance: 0.9
    reasoning: It encourages responsibility by reminding people to follow the rule even when they feel in a hurry.
  secondary_key_concepts:
  - concept_id: form
    relevance: 0.8
    reasoning: Children can identify the unique octagon shape and red color that make the Stop sign different from other signs.
  - concept_id: causation
    relevance: 0.3
    reasoning: It supports understanding that not stopping can cause accidents, while stopping can prevent someone from getting
      hurt.
  candidate_related_concepts:
  - concept_id: communication
    discipline: Social Studies
    reasoning: The sign communicates a simple action message that drivers understand instantly without needing to talk.
  - concept_id: rules
    discipline: Social Studies
    reasoning: It is a clear rule that helps children see how shared rules make busy places safer and fairer.
  - concept_id: community
    discipline: Social Studies
    reasoning: Stop signs protect the community by coordinating cars, bikes, and pedestrians who all share the same streets.
  - concept_id: symbolism
    discipline: Arts
    reasoning: The octagon and the word “STOP” symbolize an action everyone agrees on, even from far away.
  tier_guidance:
    tier_0:
      available_concepts:
      - concept_id: connection
        relevance: 0.8
        topic_anchors:
          kinesthetic:
          - attribute: makes cars pause
            value: car stops and waits
          - attribute: makes feet pause
            value: people stop walking
          visual:
          - attribute: stands at a corner
            value: sign by the street
      - concept_id: form
        relevance: 0.9
        topic_anchors:
          visual:
          - attribute: main color
            value: bright red sign
          - attribute: special shape
            value: eight-sided shape
          - attribute: big word on it
            value: says STOP in white
      primary_topic_focus: connection
    tier_1:
      available_concepts:
      - concept_id: connection
        relevance: 0.9
        topic_anchors:
          relational:
          - attribute: rule_for_everyone
            value: Cars and bikes both follow the same rule.
          kinesthetic:
          - attribute: look_then_go
            value: Stop, look both ways, then go.
          spatial:
          - attribute: near_crosswalks
            value: Often near crosswalks where people walk.
      - concept_id: function
        relevance: 0.84
        topic_anchors:
          kinesthetic:
          - attribute: prevents_bumps
            value: Stopping helps stop crashes and bumps.
          auditory:
          - attribute: quiet_wait
            value: Everything gets quieter during the stop.
          emotional:
          - attribute: safe_feeling
            value: Makes the street feel safer for families.
      - concept_id: form
        relevance: 0.74
        topic_anchors:
          structural:
          - attribute: post_and_plate
            value: Flat sign plate sits on a tall post.
          visual:
          - attribute: white_border
            value: Has a bright white edge outline.
          tactile:
          - attribute: metal_hard
            value: Hard, smooth metal that feels cool.
      primary_topic_focus: connection
    tier_2:
      available_concepts:
      - concept_id: connection
        relevance: 0.9
        topic_anchors:
          relational:
          - attribute: turn_taking_at_intersections
            value: The sign connects to taking turns so cars, bikes, and walkers can all go safely.
          - attribute: driver_passenger_shared_rule
            value: Even if a child isn’t driving, everyone in the car follows the same stop rule together.
          spatial:
          - attribute: pairs_with_stop_line
            value: The sign often connects with a painted line where vehicles should stop before going.
      - concept_id: function
        relevance: 0.9
        topic_anchors:
          temporal:
          - attribute: stop_creates_turn_taking_time
            value: Stopping makes a pause so cars, bikes, and people can take turns instead of going all at once.
          relational:
          - attribute: works_with_other_road_clues
            value: Drivers use the stop sign along with looking left-right-left to understand when it is safe to go.
          visual:
          - attribute: seen_quickly_from_far_away
            value: Its bold look helps people notice it early, giving them time to slow down and stop.
      - concept_id: responsibility
        relevance: 0.9
        topic_anchors:
          temporal:
          - attribute: stopping_protects_hidden_people
            value: A full stop helps protect someone who might be hard to see, like a child stepping out or a bike coming
              fast.
          - attribute: rule_matters_even_when_no_one_is_watching
            value: People show responsibility by stopping every time, not only when they think others will notice.
          relational:
          - attribute: shared_rule_makes_streets_fair
            value: When everyone follows the same stop rule, it feels fair and safer for the whole neighborhood.
      - concept_id: form
        relevance: 0.76
        topic_anchors:
          visual:
          - attribute: octagon_means_stop_even_without_words
            value: The eight sides help people recognize it fast, even before reading.
          - attribute: high_contrast_letters_for_distance
            value: Big white letters on red are made to be seen quickly from far away.
          structural:
          - attribute: reflective_surface_for_night
            value: Many stop signs are shiny in headlights so drivers can see them in the dark.
      - concept_id: causation
        relevance: 0.34
        topic_anchors:
          temporal:
          - attribute: braking_distance_needs_time
            value: Vehicles need time and space to slow down, so stopping early helps the brakes work safely.
      primary_topic_focus: connection
    tier_3:
      available_concepts:
      - concept_id: connection
        relevance: 0.85
        topic_anchors:
          relational:
          - attribute: shared_rule_between_strangers
            value: A stop sign connects people who don’t know each other by giving them the same rule, helping traffic take
              turns fairly.
          - attribute: part_of_a_system_of_signs
            value: Stop signs work with other road symbols (crosswalks, speed limits, signals) so the whole street system
              stays predictable.
          spatial:
          - attribute: placed_where_paths_cross
            value: Stop signs are set where roads or paths meet so drivers pause at the exact place where conflict could happen.
      - concept_id: function
        relevance: 0.74
        topic_anchors:
          relational:
          - attribute: works_as_part_of_a_shared_traffic_language
            value: A stop sign functions like a word in a city’s ‘traffic language,’ coordinating drivers, cyclists, and walkers
              who may not speak to each other but still need to cooperate.
          temporal:
          - attribute: creates_predictable_time_gaps_for_crossing
            value: By making vehicles pause, it creates small time windows so others can cross safely, turning a busy intersection
              into a predictable turn-taking system.
      - concept_id: responsibility
        relevance: 0.77
        topic_anchors:
          evaluative:
          - attribute: self_control_over_speed_and_hurry
            value: Stopping shows responsibility because it is choosing self-control over rushing, even when you feel late
              or impatient.
          - attribute: protects_most_vulnerable_road_users
            value: Following the stop rule protects people who get hurt more easily—children, older adults, and people walking
              or biking—so it connects rule-following to caring for others.
          relational:
          - attribute: trust_between_strangers_in_public_spaces
            value: Responsibility at a stop sign builds trust between strangers, because everyone depends on others to do
              the same safe action without making a special deal.
      - concept_id: form
        relevance: 0.63
        topic_anchors:
          evaluative:
          - attribute: designed_for_fast_recognition
            value: The sign’s special shape and bold design help people recognize it quickly, even when they only glimpse
              it.
          visual:
          - attribute: contrast_supports_reading_in_weather
            value: Strong color contrast helps the message stay readable in rain, fog, or bright sunlight.
          structural:
          - attribute: mounted_for_driver_eye_level
            value: The sign is mounted high enough to be seen over parked cars and plants, connecting design to safer visibility.
      - concept_id: causation
        relevance: 0.35
        topic_anchors:
          evaluative:
          - attribute: fairness_and_safety_are_linked
            value: Following the stop sign rule is an ethical choice because it protects others who are trusting the rule
              too.
      primary_topic_focus: connection
