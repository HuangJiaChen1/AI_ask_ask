- entity_id: human_body_eye
  entity_name: Eye
  entity_name_cn: 眼睛
  domain: human_body
  parent_category: facial_features
  subcategory: eyes
  primary_theme:
    theme_id: who_we_are
    weight: 0.61
    reasoning: Eyes help children explore who they are by noticing how they see, recognize faces, and observe the world around
      them.
  secondary_themes:
  - theme_id: how_world_works
    weight: 0.26
    reasoning: Children can investigate how eyes help them see colors, shapes, and light, and why blinking protects the eye.
    context_trigger: when the child squints in bright light, asks why we blink, or points out colors and shapes they can see
  - theme_id: how_we_express
    weight: 0.13
    reasoning: Eyes communicate feelings and attention because children look, stare, wink, or make eye contact to share meaning.
    context_trigger: when the child says "Look at me!" makes eye contact, winks, or notices someone’s eyes look sad or excited
  primary_key_concepts:
  - concept_id: connection
    relevance: 0.9
    reasoning: Eyes connect children to their environment by letting them notice details, read pictures, and respond to what
      they see.
  - concept_id: perspective
    relevance: 0.9
    reasoning: Children learn that what they see depends on where they stand, how close they are, and what direction they
      look.
  - concept_id: responsibility
    relevance: 0.9
    reasoning: Kids can practice eye safety by not rubbing too hard, washing hands, and wearing sunglasses or goggles when
      needed.
  secondary_key_concepts:
  - concept_id: form
    relevance: 0.8
    reasoning: Eyes have visible parts like eyelids, lashes, and iris color that children can observe and compare safely.
  - concept_id: function
    relevance: 0.8
    reasoning: The function of eyes is vision, helping children navigate spaces, recognize people, and learn from pictures
      and print.
  candidate_related_concepts:
  - concept_id: emotion
    discipline: PSPE
    reasoning: Children can notice tears, wide eyes, or relaxed eyes and connect these clues to feelings like fear or happiness.
  - concept_id: identity
    discipline: PSPE
    reasoning: Eye color and wearing glasses can become part of how children describe themselves and appreciate differences.
  - concept_id: wellbeing
    discipline: PSPE
    reasoning: Healthy screen breaks, good lighting, and eye checkups support comfortable seeing and reduce strain for young
      learners.
  - concept_id: relationships
    discipline: PSPE
    reasoning: Using eyes to look at a speaker and notice others’ expressions supports empathy, turn-taking, and friendly
      communication.
  tier_guidance:
    tier_0:
      available_concepts:
      - concept_id: connection
        relevance: 0.9
        topic_anchors:
          visual:
          - attribute: looks_at_toys
            value: watches moving toys
          kinesthetic:
          - attribute: blinking
            value: blinks open and shut
          - attribute: looking_direction
            value: looks up and down
      - concept_id: form
        relevance: 0.85
        topic_anchors:
          visual:
          - attribute: iris_color
            value: blue brown or green
          - attribute: eyelashes
            value: tiny hairs on top
          tactile:
          - attribute: eyelid_feel
            value: soft skin flap
      primary_topic_focus: connection
    tier_1:
      available_concepts:
      - concept_id: connection
        relevance: 0.9
        topic_anchors:
          relational:
          - attribute: works_with_brain
            value: Brain helps eyes turn sights into ideas.
          spatial:
          - attribute: face_location
            value: Two eyes sit on the front of face.
          emotional:
          - attribute: look_shows_care
            value: Looking at someone can feel kind.
      - concept_id: form
        relevance: 0.78
        topic_anchors:
          visual:
          - attribute: white_part
            value: White part wraps around the colored circle.
          - attribute: pupil_dot
            value: Tiny black dot sits in the center.
          structural:
          - attribute: tear_corner
            value: Inner corner makes tears for wetness.
      - concept_id: function
        relevance: 0.82
        topic_anchors:
          kinesthetic:
          - attribute: eyes_track_moving
            value: Eyes follow a rolling ball smoothly.
          tactile:
          - attribute: tears_clean
            value: Tears wash away dust to help see.
      primary_topic_focus: connection
    tier_2:
      available_concepts:
      - concept_id: connection
        relevance: 0.9
        topic_anchors:
          relational:
          - attribute: works_with_light
            value: Eyes need light to see clearly, so bright sunlight, lamps, and shadows change what the eye can notice.
          - attribute: teamwork_with_body
            value: Eyes work together with the neck and whole body because turning your head and moving closer can help you
              see details.
          temporal:
          - attribute: rest_and_breaks_help_seeing
            value: After lots of close looking (like books or screens), eye breaks can help eyes feel comfortable again.
      - concept_id: perspective
        relevance: 0.9
        topic_anchors:
          spatial:
          - attribute: distance_changes_size_appearance
            value: When you move closer, things look bigger, and when you move farther away, they look smaller.
          - attribute: position_changes_hidden_parts
            value: Standing to one side can hide part of an object, but moving around can reveal what was blocked.
          relational:
          - attribute: people_can_see_different_views
            value: Two friends looking at the same thing from different spots may describe it differently because their eyes
              get different views.
      - concept_id: responsibility
        relevance: 0.9
        topic_anchors:
          kinesthetic:
          - attribute: gentle_touch_prevents_scratch
            value: Rubbing eyes hard can scratch the surface, so using gentle hands protects the eye.
          - attribute: hands_clean_reduce_germ_spread
            value: Washing hands helps stop germs from getting into eyes and causing itchiness or infection.
          relational:
          - attribute: protective_wear_when_needed
            value: Sunglasses in bright sun or goggles for messy play help keep eyes safe from strong light and splashes.
      - concept_id: form
        relevance: 0.78
        topic_anchors:
          structural:
          - attribute: cornea_clear_window
            value: The front of the eye has a clear cover that acts like a window to let light in.
          - attribute: pupil_changes_size
            value: The dark center can look bigger in dim light and smaller in bright light to control how much light enters.
          spatial:
          - attribute: two_eyes_make_wide_view
            value: Having two eyes side-by-side helps you see more space around you and helps with judging how far things
              are.
      - concept_id: function
        relevance: 0.8
        topic_anchors:
          structural:
          - attribute: pupil_controls_light_amount
            value: The pupil changes size to let in more light in dim places and less light in bright places.
          kinesthetic:
          - attribute: blink_spreads_tears_for_protection
            value: Blinking spreads a thin layer of tears that keeps the eye surface smooth and helps wash away dust.
          relational:
          - attribute: eyes_send_messages_to_brain
            value: Eyes gather light information and send it to the brain, which helps you recognize faces, letters, and places.
      primary_topic_focus: connection
    tier_3:
      available_concepts:
      - concept_id: connection
        relevance: 0.86
        topic_anchors:
          relational:
          - attribute: vision_supports_learning_tools
            value: Eyes connect to school tools like books, maps, and number lines because seeing symbols clearly helps children
              gather information and solve problems.
          - attribute: eyes_work_with_balance_system
            value: Eyes team up with the inner ear and muscles so the body can stay steady; when vision is blurry, balance
              and movement can feel harder.
          evaluative:
          - attribute: eye_contact_rules_change_by_culture
            value: In some cultures eye contact shows respect, while in others it can feel rude, connecting how we look at
              people to community rules and kindness.
      - concept_id: perspective
        relevance: 0.86
        topic_anchors:
          spatial:
          - attribute: blind_spot_changes_what_you_notice
            value: Each eye has a tiny blind spot, so two people can miss different details even when looking at the same
              page or scene.
          relational:
          - attribute: brain_combines_two_views_into_one
            value: The brain blends what each eye sees, helping us judge depth, which is why closing one eye can make catching
              or aiming harder.
          evaluative:
          - attribute: seeing_is_not_same_for_everyone
            value: Some people see with glasses, some have low vision, and some are color-blind, reminding us that “what I
              see” is not always “what you see.”
      - concept_id: responsibility
        relevance: 0.9
        topic_anchors:
          temporal:
          - attribute: screen_breaks_reduce_strain_over_time
            value: Taking regular screen breaks helps eyes refocus and can prevent tired, dry feelings after long reading
              or gaming sessions.
          relational:
          - attribute: shared_tools_need_hygiene_rules
            value: Sharing goggles, VR headsets, or makeup can spread germs, so responsibility includes cleaning shared items
              and not swapping eye drops.
          evaluative:
          - attribute: telling_an_adult_about_eye_problems_is_safety
            value: It is responsible to speak up about blurry vision, headaches, or eye pain because early checkups can protect
              learning and wellbeing.
      - concept_id: form
        relevance: 0.62
        topic_anchors:
          structural:
          - attribute: iris_is_a_muscle_ring
            value: The iris is a ring of muscle that can tighten or relax, showing how a body part can change shape to help
              the whole system work.
          - attribute: eyelid_has_oily_edge_glands
            value: Tiny glands along the eyelid edge make oils that help keep tears from drying too fast, linking small structures
              to comfort and health.
          spatial:
          - attribute: eyes_set_in_bony_sockets
            value: Each eye sits in a hard skull socket that protects it like a helmet, connecting body form to safety design
              ideas.
      - concept_id: function
        relevance: 0.8
        topic_anchors:
          structural:
          - attribute: lens_changes_shape_to_focus
            value: The lens can change shape to focus near and far, like a camera adjusting focus to make letters and faces
              clearer.
          temporal:
          - attribute: dark_to_light_adjustment_takes_time
            value: After moving from bright light to a dark room, eyes need time to adjust, showing that vision is a process,
              not instant.
          relational:
          - attribute: vision_supports_social_understanding
            value: Eyes help read facial expressions and body language, which supports empathy and teamwork during play and
              class discussions.
      primary_topic_focus: connection
