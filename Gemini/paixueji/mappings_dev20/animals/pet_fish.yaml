- entity_id: animals_goldfish
  entity_name: Goldfish
  entity_name_cn: 金鱼
  domain: animals
  parent_category: fish
  subcategory: pet fish
  primary_theme:
    theme_id: how_world_works
    weight: 0.36
    reasoning: Goldfish let children watch how a living creature moves, breathes in water, and needs food and clean space,
      supporting curiosity about how living things work.
  secondary_themes:
  - theme_id: who_we_are
    weight: 0.36
    reasoning: As a pet, a goldfish invites children to practice responsibility, patience, and empathy by remembering feeding
      times and noticing the fish’s health and behavior.
    context_trigger: when the child asks to feed the fish, watches it for a long time, or says “Is it hungry?” “Is it okay?”
      or “It’s sleeping!”
  - theme_id: sharing_planet
    weight: 0.28
    reasoning: Caring for a goldfish connects to sharing water resources and respecting animal needs, including keeping tanks
      clean and not releasing pets into lakes or rivers.
    context_trigger: when the child pours water, points to a dirty tank, asks why filters run, or talks about putting the
      fish “back in the river”
  primary_key_concepts:
  - concept_id: function
    relevance: 0.9
    reasoning: Children can observe how the goldfish uses fins to swim and gills to breathe, and how it finds food, linking
      body parts to what they do.
  - concept_id: form
    relevance: 0.8
    reasoning: The goldfish’s shiny scales, tail fin shape, and rounded body are clear features children can notice and draw,
      comparing it with other fish.
  - concept_id: causation
    relevance: 0.9
    reasoning: Kids see cause and effect when feeding leads to swimming toward food, or when loud tapping or quick movements
      make the fish dart away.
  secondary_key_concepts:
  - concept_id: change
    relevance: 0.9
    reasoning: Children can notice change as the fish grows, its color shifts slightly, and the tank environment changes when
      water is cleaned or plants are added.
  - concept_id: connection
    relevance: 0.7
    reasoning: A goldfish helps children see connections between living things and their environment, like how water quality,
      oxygen, and food all affect health.
  candidate_related_concepts:
  - concept_id: habitat
    discipline: Science
    reasoning: Children explore the goldfish habitat by comparing a tank to ponds, noticing the need for water, space, hiding
      places, and clean conditions.
  - concept_id: growth
    discipline: Science
    reasoning: Kids can track growth by noticing the fish getting bigger and needing different amounts of food and a larger
      tank over time.
  - concept_id: adaptation
    discipline: Science
    reasoning: Fins, gills, and slippery scales show how the goldfish is adapted to living in water, moving smoothly and breathing
      underwater.
  - concept_id: cycles
    discipline: Science
    reasoning: Children can learn simple cycles like feeding schedules and day-night activity, plus tank care cycles like
      filtering and water changes.
  tier_guidance:
    tier_0:
      available_concepts:
      - concept_id: form
        relevance: 0.9
        topic_anchors:
          visual:
          - attribute: body_color
            value: bright orange fish
          - attribute: tail_shape
            value: wide fan tail
          tactile:
          - attribute: scale_look
            value: shiny, sparkly scales
      - concept_id: connection
        relevance: 0.75
        topic_anchors:
          visual:
          - attribute: where_it_is
            value: swims in a tank
          - attribute: water_look
            value: clear water around it
          kinesthetic:
          - attribute: when_food_comes
            value: swims to the top
      primary_topic_focus: form
    tier_1:
      available_concepts:
      - concept_id: change
        relevance: 0.86
        topic_anchors:
          visual:
          - attribute: growth_over_time
            value: Starts tiny, then grows bigger in the tank.
          kinesthetic:
          - attribute: activity_changes
            value: Sometimes zooms fast, sometimes floats and rests.
          structural:
          - attribute: cleaning_changes_home
            value: After cleaning, the tank feels fresh for fish.
      - concept_id: function
        relevance: 0.88
        topic_anchors:
          kinesthetic:
          - attribute: fin_power
            value: Fins push water to swim forward and turn.
          structural:
          - attribute: gill_breathing
            value: Gills take air from water for breathing.
          tactile:
          - attribute: mouth_nibbles
            value: Little mouth nibbles food bits, then gulps.
      - concept_id: form
        relevance: 0.76
        topic_anchors:
          visual:
          - attribute: body_shape
            value: Round tummy body, like a shiny swimming bean.
          - attribute: eye_look
            value: Big round eyes that look like tiny marbles.
          structural:
          - attribute: fin_set
            value: Side fins, top fin, and tail fin for steering.
      - concept_id: connection
        relevance: 0.68
        topic_anchors:
          relational:
          - attribute: needs_people_care
            value: People feed it and clean water to help it.
          - attribute: tank_helpers
            value: Filter and bubbler help keep water healthy.
          spatial:
          - attribute: not_for_rivers
            value: Stays in a tank home, not lakes or rivers.
      primary_topic_focus: change
    tier_2:
      available_concepts:
      - concept_id: causation
        relevance: 0.9
        topic_anchors:
          kinesthetic:
          - attribute: fast_darting_when_startled
            value: Sudden shadows or quick hands near the glass can make the goldfish flick its tail and dart away because
              it senses danger.
          auditory:
          - attribute: vibration_startle_response
            value: Strong vibrations (like banging on the stand) can make the fish change direction quickly because the water
              shakes around its body.
          structural:
          - attribute: gill_movement_speeds_up_in_low_oxygen
            value: When there is less oxygen in the water, the goldfish moves its gill covers faster to pull more water across
              its gills.
      - concept_id: change
        relevance: 0.9
        topic_anchors:
          temporal:
          - attribute: day_night_rest_pattern
            value: Goldfish often slow down and rest more when lights are off and become more active when the tank is lit.
          visual:
          - attribute: fins_can_look_worn_then_regrow
            value: If fins get torn a little, they can slowly grow back when the water is clean and the fish is healthy.
          structural:
          - attribute: waste_builds_up_between_water_changes
            value: Over time, poop and leftover food can turn into yucky chemicals, so the tank needs regular water changes
              to stay safe.
      - concept_id: function
        relevance: 0.88
        topic_anchors:
          structural:
          - attribute: lateral_line_senses_water_movement
            value: A special line along its side helps it feel tiny water wiggles, so it can notice nearby fish, falling food,
              or a hand coming close.
          - attribute: swim_bladder_adjusts_float_level
            value: An air-filled pocket inside helps it stay at the right height in the water without constant hard swimming.
          kinesthetic:
          - attribute: tail_and_body_wave_make_forward_motion
            value: It moves forward by bending its body and tail side-to-side, pushing water backward like a paddle to glide
              ahead.
      - concept_id: form
        relevance: 0.8
        topic_anchors:
          structural:
          - attribute: swim_bladder_float_helper
            value: Inside its body, a swim bladder helps the goldfish float up, sink down, and stay level without working
              all the time.
          visual:
          - attribute: operculum_gill_cover_flaps
            value: The gill covers open and close like little doors, showing where the fish breathes.
      - concept_id: connection
        relevance: 0.7
        topic_anchors:
          relational:
          - attribute: plants_and_fish_share_gases
            value: Plants can help use some waste and make oxygen in light, and the fish uses that oxygen to breathe.
          spatial:
          - attribute: needs_open_swim_space_and_hiding_space
            value: A healthy tank has open areas for swimming and places to tuck behind, because feeling safe affects how
              the fish eats and moves.
      primary_topic_focus: causation
    tier_3:
      available_concepts:
      - concept_id: causation
        relevance: 0.86
        topic_anchors:
          kinesthetic:
          - attribute: overfeeding_clouds_water
            value: When too much food is added, extra bits can rot and make the water cloudy, which can stress the fish and
              make it less active.
          - attribute: sudden_light_change_triggers_hiding
            value: When the tank light turns on suddenly after darkness, the goldfish may rush to a corner or behind decorations
              because quick changes can feel unsafe.
          structural:
          - attribute: filter_current_affects_swimming_effort
            value: When a filter makes a stronger current, the goldfish has to swim harder to stay in place, like walking
              against wind, which can change where it chooses to rest.
      - concept_id: change
        relevance: 0.84
        topic_anchors:
          temporal:
          - attribute: color_intensity_shifts_with_health_and_light
            value: Over weeks, a goldfish’s colors can look brighter or duller depending on lighting and health, so noticing
              color changes can be an early clue about well-being.
          - attribute: water_parameters_drift_between_tests
            value: As time passes, invisible changes like rising nitrate can happen even if the tank looks fine, showing that
              some important changes are hidden and slow.
          relational:
          - attribute: changing_tankmates_changes_behavior
            value: If another fish is added or removed, the goldfish may explore more, hide more, or compete for food, showing
              that social changes can reshape routines.
      - concept_id: function
        relevance: 0.62
        topic_anchors:
          structural:
          - attribute: scales_and_slime_coat_reduce_infection_risk
            value: Its slippery slime coat and scales act like a protective shield, helping keep germs out, which is why rough
              handling can harm more than you can see.
          relational:
          - attribute: filter_and_bacteria_system_functions_like_a_life_support_team
            value: In a tank, the goldfish depends on a hidden teamwork system—filter plus helpful bacteria—to change waste
              into safer chemicals, similar to how a city treats dirty water.
          evaluative:
          - attribute: pet_goldfish_show_how_humans_change_animal_functions
            value: When people keep goldfish as pets, we become part of how the animal survives—our choices about food, space,
              and water quality can help its body work well or make it struggle.
      - concept_id: form
        relevance: 0.72
        topic_anchors:
          structural:
          - attribute: double_tail_in_fancy_varieties
            value: Some goldfish have split, flowing double tails, a body form people bred on purpose, which can look beautiful
              but may make fast swimming harder.
          - attribute: lateral_line_is_a_visible_sense_path
            value: Many goldfish show a faint line along the side of the body, a body feature linked to sensing vibrations,
              reminding us that “seeing” the world can include sensing water movement.
          visual:
          - attribute: reflective_scales_create_shimmer_patterns
            value: As the fish turns, the scale surfaces reflect light like tiny mirrors, creating moving patterns that help
              children compare how light behaves on curved surfaces.
      - concept_id: connection
        relevance: 0.78
        topic_anchors:
          relational:
          - attribute: nitrogen_cycle_links_waste_to_bacteria_to_health
            value: The fish’s waste connects to helpful bacteria that change harmful ammonia into less harmful chemicals,
              showing how tiny living things support bigger living things.
          - attribute: food_web_thinking_from_pond_to_tank
            value: Goldfish eating pellets in a tank is a simplified version of pond food webs, helping children compare natural
              ecosystems with human-made ones.
          evaluative:
          - attribute: pet_trade_and_wildlife_impact
            value: Keeping a goldfish connects personal choices to the wider world because releasing pet fish can harm local
              species, raising questions about what humans owe to shared habitats.
      primary_topic_focus: causation
