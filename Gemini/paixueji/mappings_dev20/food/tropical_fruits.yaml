- entity_id: food_banana
  entity_name: Banana
  entity_name_cn: 香蕉
  domain: food
  parent_category: fruits
  subcategory: tropical_fruits
  primary_theme:
    theme_id: who_we_are
    weight: 0.39
    reasoning: A banana relates to who we are because children choose it as a snack, notice how it tastes and feels, and learn
      how food helps their bodies grow and play.
  secondary_themes:
  - theme_id: how_world_works
    weight: 0.27
    reasoning: Children explore how bananas ripen from green to yellow to brown, and how peeling reveals the inside, showing
      changes over time.
    context_trigger: when the child points to spots and says the banana is changing, or asks why it is greener or softer
  - theme_id: sharing_planet
    weight: 0.19
    reasoning: Bananas can prompt discussion about plants growing in warm places, transporting food, and using peels for compost
      instead of litter.
    context_trigger: when the child throws or drops a peel, or asks where bananas grow and how they get to the shop
  - theme_id: how_we_organize
    weight: 0.15
    reasoning: Buying bananas in bunches and sorting them by ripeness shows how stores organize food, and how families plan
      snacks for school or trips.
    context_trigger: when the child counts bananas in a bunch, chooses the 'yellow one', or packs one into a lunchbox
  primary_key_concepts:
  - concept_id: connection
    relevance: 0.9
    reasoning: A banana connects children to their bodies, to plants that grow fruit, and to people who pick, ship, and sell
      food we eat every day.
  - concept_id: perspective
    relevance: 0.9
    reasoning: Children notice that some friends like bananas very ripe and others do not, building understanding that preferences
      and needs differ.
  - concept_id: responsibility
    relevance: 0.9
    reasoning: Eating bananas encourages responsibility by washing hands, peeling safely, cleaning up peels, and choosing
      a snack portion without wasting food.
  secondary_key_concepts:
  - concept_id: form
    relevance: 0.7
    reasoning: Children can describe the banana’s curved shape, soft flesh, peel layers, and small strings, using careful
      observation and new vocabulary.
  - concept_id: function
    relevance: 0.7
    reasoning: A banana’s function is to be eaten for quick energy, and children explore ways to use it in smoothies, slices,
      or baking.
  candidate_related_concepts:
  - concept_id: nutrition
    discipline: PSPE
    reasoning: Bananas are an easy example of fruit that gives energy and supports healthy snack choices children can recognize
      and practice.
  - concept_id: relationships
    discipline: Social Studies
    reasoning: Sharing bananas, offering the last one, or preparing fruit together supports kindness, turn-taking, and family
      or classroom routines.
  - concept_id: wellbeing
    discipline: PSPE
    reasoning: Children can connect bananas to feeling ready to play, noticing hunger before activities, and choosing foods
      that help them feel good.
  - concept_id: resources
    discipline: Science
    reasoning: Talking about bananas includes natural resources for growing plants and the idea of reducing waste by using
      peels properly.
  tier_guidance:
    tier_0:
      available_concepts:
      - concept_id: connection
        relevance: 0.7
        topic_anchors:
          tactile:
          - attribute: holding the snack
            value: fits in hand
          kinesthetic:
          - attribute: peeling action
            value: pull peel down
          auditory:
          - attribute: eating sound
            value: soft munch sound
      - concept_id: form
        relevance: 0.9
        topic_anchors:
          visual:
          - attribute: banana shape
            value: long curvy shape
          - attribute: peel color
            value: yellow with spots
          tactile:
          - attribute: inside feel
            value: soft mushy inside
      primary_topic_focus: connection
    tier_1:
      available_concepts:
      - concept_id: connection
        relevance: 0.86
        topic_anchors:
          relational:
          - attribute: grows_on_big_plants
            value: Bananas grow in bunches on tall plants.
          spatial:
          - attribute: from_warm_places_to_stores
            value: They travel far to reach our shops.
          emotional:
          - attribute: snack_choice
            value: Choosing one can feel like a healthy win.
      - concept_id: form
        relevance: 0.7
        topic_anchors:
          visual:
          - attribute: brown_spots_appear
            value: Little freckles show up as it gets riper.
          - attribute: tiny_strings_under_peel
            value: Thin stringy bits cling to the fruit.
          structural:
          - attribute: soft_fruit_inside
            value: Inside is mushy and breaks into bites.
      - concept_id: function
        relevance: 0.72
        topic_anchors:
          kinesthetic:
          - attribute: slice_and_share
            value: Cut into coins to share with friends.
          tactile:
          - attribute: sweet_smell_and_taste
            value: Smells sweet and tastes creamy on tongue.
          relational:
          - attribute: gives_energy_for_play
            value: Food helps bodies run, jump, and climb.
      primary_topic_focus: connection
    tier_2:
      available_concepts:
      - concept_id: connection
        relevance: 0.9
        topic_anchors:
          relational:
          - attribute: bananas connect plant growing to what we eat
            value: The fruit comes from a banana plant, so children can link farms and sunshine to the snack in their hand.
          - attribute: transport connects far places to local shops
            value: Bananas often travel from warm places by truck or ship, so many helpers are involved before it reaches
              a store.
          temporal:
          - attribute: ripeness connects to timing meals and shopping
            value: Families choose greener bananas for later and yellower bananas for sooner, because the fruit keeps changing
              after it’s picked.
      - concept_id: perspective
        relevance: 0.9
        topic_anchors:
          tactile:
          - attribute: ripeness_texture_preferences
            value: Some people like bananas firm because they feel less mushy, while others like them soft because they feel
              sweeter and easier to chew.
          emotional:
          - attribute: food_smell_can_feel_good_or_strong
            value: The banana smell can feel yummy and comforting to some children, but too strong to others, especially when
              very ripe.
      - concept_id: responsibility
        relevance: 0.9
        topic_anchors:
          kinesthetic:
          - attribute: peel_handling_prevents_slips
            value: Putting the peel in the bin or compost right away helps keep floors safe because peels can be slippery.
          - attribute: portion_choices_reduce_waste
            value: Choosing a banana size you can finish (or saving half) helps prevent food from being thrown away.
          relational:
          - attribute: sharing_fairly_in_a_bunch
            value: When there are only a few bananas, deciding together who gets which one helps keep snack time peaceful
              and fair.
      - concept_id: form
        relevance: 0.7
        topic_anchors:
          structural:
          - attribute: peel layers protect the soft fruit
            value: The peel is like a jacket that keeps the inside from getting squished and keeps dirt away until it’s opened.
          - attribute: fibers run along the banana like tiny strings
            value: Those stringy bits are part of the fruit’s structure and can stick to the peel when it’s opened.
          visual:
          - attribute: spot patterns show what’s happening inside
            value: More brown speckles often mean the banana is softer and tastes sweeter than a green or pale yellow one.
      - concept_id: function
        relevance: 0.7
        topic_anchors:
          structural:
          - attribute: natural_packaging_protects_food
            value: The peel works like a wrapper that keeps the soft fruit cleaner and less bruised until you’re ready to
              eat it.
          temporal:
          - attribute: ripening_makes_sugars_more_available
            value: As bananas ripen, they become softer and taste sweeter because the fruit changes inside over time.
          kinesthetic:
          - attribute: different_uses_change_how_it_eats
            value: Mashing, slicing, or blending a banana changes the texture so it can be used in smoothies, oatmeal, or
              baking.
      primary_topic_focus: connection
    tier_3:
      available_concepts:
      - concept_id: connection
        relevance: 0.86
        topic_anchors:
          relational:
          - attribute: food_chain_from_farm_to_table
            value: A banana connects farmers, truck drivers, shop workers, and families, showing how many jobs help one snack
              reach a lunchbox.
          evaluative:
          - attribute: waste_choices_affect_shared_spaces
            value: Putting peels in compost or trash connects personal choices to community cleanliness, because litter can
              attract pests and make parks unsafe.
      - concept_id: perspective
        relevance: 0.9
        topic_anchors:
          evaluative:
          - attribute: taste_and_texture_preferences
            value: One child may like a firm, less-sweet banana while another prefers a soft, very sweet one, showing that
              food preferences can be different and still equally valid.
          relational:
          - attribute: family_food_customs
            value: Some families eat bananas plain while others use them in cooking or smoothies, helping children see how
              culture and routines shape what counts as a “normal” snack.
      - concept_id: responsibility
        relevance: 0.9
        topic_anchors:
          evaluative:
          - attribute: waste_and_resource_ethic
            value: Choosing a banana you will actually eat and using peels properly is responsible because food takes land,
              water, and work to grow and transport.
          spatial:
          - attribute: safe_peel_disposal
            value: Putting peels in a bin or compost is responsible because peels on the ground can create slipping hazards
              in shared spaces.
          relational:
          - attribute: fair_sharing_in_groups
            value: When bananas are in a bunch, responsibility includes noticing who hasn’t had one yet and sharing so everyone
              gets a turn without grabbing.
      - concept_id: form
        relevance: 0.6
        topic_anchors:
          structural:
          - attribute: peel_has_inner_threads_and_sections
            value: Inside the peel, the banana is organized into soft sections with thin fibers, showing that foods have structures
              even when they look simple.
          visual:
          - attribute: ripeness_changes_skin_pattern_and_firmness
            value: As ripeness increases, the skin pattern shifts from green to yellow to spotted brown, and the shape can
              look slightly softer or more droopy.
          tactile:
          - attribute: texture_changes_from_starchy_to_creamy
            value: A greener banana feels firmer and more starchy, while a riper one feels creamier, showing how time changes
              a food’s physical properties.
      - concept_id: function
        relevance: 0.7
        topic_anchors:
          temporal:
          - attribute: ripening_changes_uses
            value: As bananas ripen, their function in cooking changes—firmer ones work well sliced, while very ripe ones
              work well mashed for baking or smoothies.
          relational:
          - attribute: plant_reproduction_role
            value: In nature, fruit functions to help plants spread seeds, which connects bananas to plant life cycles even
              though many store bananas are grown from cultivated varieties.
      primary_topic_focus: connection
