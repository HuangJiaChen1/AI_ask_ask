# Teaching Effectiveness Scenarios
# Tests overall pedagogical quality and adaptive teaching

scenarios:
  - id: "TEACH-ADAPT-001"
    name: "Model should adapt to child's level"
    description: "Tests whether model adjusts complexity based on responses"

    setup:
      object_name: "clock"
      key_concept: "telling time"
      age: 5
      guide_phase: "active"

    conversation:
      - role: "model"
        content: "Can you tell me what the big hand and little hand on the clock show us?"
        pedagogical_intent: "Assess understanding of clock hands"
        question_type: "WHAT"
        target_knowledge: "Big hand = minutes, little hand = hours"

      - role: "child"
        content: "I know the little one is hours!"
        response_type: "PARTIAL"
        knowledge_gap: "Knows one part, needs to learn about the big hand"

    evaluation:
      must_do:
        - "Praise the correct knowledge"
        - "Focus teaching on what's missing (big hand)"
        - "Not re-explain what child already knows"
      must_not_do:
        - "Re-explain hours (already knows)"
        - "Ask the same question again"
        - "Ignore what child got right"
      ideal_response_pattern: "right|great|big hand|minutes"

  - id: "TEACH-PATIENCE-001"
    name: "Multiple 'I don't know' responses"
    description: "Tests whether model remains patient and tries different approaches"

    setup:
      object_name: "shadow"
      key_concept: "light blocking"
      age: 5
      guide_phase: "active"

    conversation:
      - role: "model"
        content: "Why do you think your shadow appears when you stand in the sun?"
        pedagogical_intent: "Understand that body blocks light"
        question_type: "WHY"
        target_knowledge: "Shadow appears because body blocks sunlight"

      - role: "child"
        content: "I really don't know"
        response_type: "DONT_KNOW"
        knowledge_gap: "Doesn't connect body, light, and shadow"

    evaluation:
      must_do:
        - "Try a different approach (demonstration, analogy)"
        - "Break down into simpler observation"
        - "Remain encouraging and patient"
      must_not_do:
        - "Express frustration"
        - "Give up and provide answer directly"
        - "Ask the same question in different words"
      ideal_response_pattern: "block|cover|stand.*between|flashlight|try"

  - id: "TEACH-CONNECT-001"
    name: "Model should connect to prior knowledge"
    description: "Tests whether model builds on child's experience"

    setup:
      object_name: "snowflake"
      key_concept: "water states"
      age: 6
      guide_phase: "exploration"

    conversation:
      - role: "model"
        content: "These snowflakes are made of frozen water! What else do you know that's made of frozen water?"
        pedagogical_intent: "Connect snowflakes to familiar ice concepts"
        question_type: "WHAT"
        target_knowledge: "Snow and ice are both frozen water"

      - role: "child"
        content: "Ice cubes in my drink!"
        response_type: "ANSWER"
        knowledge_gap: "May not realize connection between ice and snow"

    evaluation:
      must_do:
        - "Enthusiastically confirm the connection"
        - "Extend to show snow = tiny ice crystals"
        - "Build excitement about the discovery"
      must_not_do:
        - "Move on without deepening the connection"
        - "Just say 'yes' without elaboration"
        - "Miss the chance to expand understanding"
      ideal_response_pattern: "exactly|same|ice|frozen|tiny|crystals"

  - id: "TEACH-PACE-001"
    name: "Model should not overwhelm with information"
    description: "Tests whether model introduces concepts gradually"

    setup:
      object_name: "butterfly"
      key_concept: "life cycle"
      age: 5
      guide_phase: "introduction"

    conversation:
      - role: "model"
        content: "This butterfly wasn't always a butterfly! Do you want to know its secret?"
        pedagogical_intent: "Create curiosity about metamorphosis"
        question_type: "OPEN"
        target_knowledge: "Butterflies start as caterpillars"

      - role: "child"
        content: "Yes! What secret?"
        response_type: "ENGAGEMENT"
        knowledge_gap: "Doesn't know about life cycle yet"

    evaluation:
      must_do:
        - "Reveal ONE concept (was a caterpillar)"
        - "Create more curiosity"
        - "Let child digest before adding more"
      must_not_do:
        - "Explain entire life cycle at once"
        - "Use technical terms (metamorphosis, chrysalis)"
        - "Overwhelm with multiple facts"
      ideal_response_pattern: "caterpillar|crawl|eat|change"

  - id: "TEACH-REDIRECT-001"
    name: "Model handles off-topic response"
    description: "Tests whether model gently redirects while validating"

    setup:
      object_name: "flower"
      key_concept: "pollination"
      age: 6
      guide_phase: "active"

    conversation:
      - role: "model"
        content: "See the bee visiting the flower? Why do you think bees like flowers?"
        pedagogical_intent: "Introduce pollination concept"
        question_type: "WHY"
        target_knowledge: "Bees get nectar, flowers get pollinated"

      - role: "child"
        content: "My mom is scared of bees!"
        response_type: "OFF_TOPIC"
        knowledge_gap: "Distracted from the learning topic"

    evaluation:
      must_do:
        - "Acknowledge the child's comment briefly"
        - "Redirect to the learning topic"
        - "Keep engagement positive"
      must_not_do:
        - "Ignore the child's comment"
        - "Stay on the tangent too long"
        - "Make the child feel bad for the comment"
      ideal_response_pattern: "bees|friend|help|flowers|food|nectar"
