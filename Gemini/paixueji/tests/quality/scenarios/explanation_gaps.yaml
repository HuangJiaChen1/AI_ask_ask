# Explanation Gap Scenarios
# Tests whether the model provides complete, effective explanations

scenarios:
  - id: "EXPLAIN-INCOMPLETE-001"
    name: "Child asks 'why' and needs full explanation"
    description: "Tests whether model provides complete causal explanations"

    setup:
      object_name: "rainbow"
      key_concept: "light refraction"
      age: 6
      guide_phase: "exploration"

    conversation:
      - role: "model"
        content: "Look at that beautiful rainbow! Do you know why we can see it?"
        pedagogical_intent: "Introduce concept of light and water"
        question_type: "WHY"
        target_knowledge: "Sunlight bends through water droplets to show colors"

      - role: "child"
        content: "Why is there a rainbow?"
        response_type: "QUESTION"
        knowledge_gap: "Wants to understand the cause"

    evaluation:
      must_do:
        - "Explain the core mechanism (light + water)"
        - "Use simple, concrete language"
        - "Make it feel like discovery, not lecture"
      must_not_do:
        - "Just say 'it's pretty' without explaining"
        - "Use technical terms like 'refraction'"
        - "Dismiss the question"
      ideal_response_pattern: "sun|light|water|rain|drops|bends|colors"

  - id: "EXPLAIN-CURIOSITY-001"
    name: "Child shows genuine curiosity"
    description: "Tests whether model capitalizes on curiosity moments"

    setup:
      object_name: "caterpillar"
      key_concept: "metamorphosis"
      age: 5
      guide_phase: "active"

    conversation:
      - role: "model"
        content: "This caterpillar will become something very different someday!"
        pedagogical_intent: "Spark curiosity about transformation"
        question_type: "STATEMENT"
        target_knowledge: "Caterpillars transform into butterflies"

      - role: "child"
        content: "What?! How?! Tell me!"
        response_type: "ENGAGEMENT"
        knowledge_gap: "Curious but doesn't know about metamorphosis"

    evaluation:
      must_do:
        - "Match the child's excitement"
        - "Reveal the transformation (butterfly!)"
        - "Tease the 'how' for continued engagement"
      must_not_do:
        - "Dampen enthusiasm with flat response"
        - "Over-explain metamorphosis"
        - "Miss the teachable moment"
      ideal_response_pattern: "butterfly|amazing|change|cocoon|chrysalis"

  - id: "EXPLAIN-ANALOGY-001"
    name: "Abstract concept needs concrete analogy"
    description: "Tests whether model uses effective analogies"

    setup:
      object_name: "wind"
      key_concept: "air movement"
      age: 5
      guide_phase: "exploration"

    conversation:
      - role: "model"
        content: "Can you feel the wind? What do you think wind is?"
        pedagogical_intent: "Understand that wind is moving air"
        question_type: "WHAT"
        target_knowledge: "Wind is air that moves"

      - role: "child"
        content: "Is it invisible?"
        response_type: "QUESTION"
        knowledge_gap: "Struggling with abstract concept"

    evaluation:
      must_do:
        - "Affirm that air is invisible"
        - "Use concrete analogy (blowing, breath, fan)"
        - "Help child 'see' the invisible"
      must_not_do:
        - "Give abstract explanation"
        - "Say 'yes' without elaboration"
        - "Use technical terms"
      ideal_response_pattern: "blow|breath|feel|fan|move|push"

  - id: "EXPLAIN-FOLLOWUP-001"
    name: "Child asks follow-up question"
    description: "Tests whether model handles deepening curiosity"

    setup:
      object_name: "ant"
      key_concept: "ant behavior / teamwork"
      age: 6
      guide_phase: "active"

    conversation:
      - role: "model"
        content: "See how the ants work together to carry that big crumb? They're amazing team workers!"
        pedagogical_intent: "Observe cooperative behavior"
        question_type: "STATEMENT"
        target_knowledge: "Ants work together because they communicate and share tasks"

      - role: "child"
        content: "But how do they know what to do?"
        response_type: "QUESTION"
        knowledge_gap: "Curious about ant communication"

    evaluation:
      must_do:
        - "Address the 'how' of communication"
        - "Mention smell/scent trails in simple terms"
        - "Keep the wonder alive"
      must_not_do:
        - "Say 'they just know'"
        - "Get too technical about pheromones"
        - "Redirect away from the question"
      ideal_response_pattern: "smell|scent|tell|signal|follow|trail"
